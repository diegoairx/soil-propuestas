// Parser CSV robusto — maneja comillas, comas dentro de comillas, escape ""
function parseCSV(text) {
  // Limpiar BOM si existe
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i+1] === '"') { cell += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      cell += ch; i++; continue;
    }
    if (ch === '"') { inQuotes = true; i++; continue; }
    if (ch === ",") { row.push(cell); cell = ""; i++; continue; }
    if (ch === "\r") { i++; continue; }
    if (ch === "\n") { row.push(cell); rows.push(row); row = []; cell = ""; i++; continue; }
    cell += ch; i++;
  }
  // Última fila si no termina con newline
  if (cell.length > 0 || row.length > 0) { row.push(cell); rows.push(row); }
  // Filtrar filas vacías
  return rows.filter(r => r.some(c => c.trim().length > 0));
}

// Normalizar nombres de columnas (quita acentos, lowercase, trim)
const normCol = (s) => (s || "").trim().toLowerCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g, "");

// Mapeo flexible de columnas — acepta múltiples formatos (Notion export, export propio, etc.)
const COL_ALIASES = {
  proyecto:        ["proyecto", "nombre proyecto", "obra", "name"],
  cliente:         ["cliente", "clientes", "mandante", "empresa"],
  contacto:        ["contacto", "contact", "responsable"],
  email:           ["email", "correo electronico", "correo", "mail", "e-mail"],
  telefono:        ["telefono", "fono", "phone", "celular"],
  monto:           ["monto", "monto uf", "monto clp", "monto proyecto", "valor", "valor uf", "presupuesto", "amount"],
  status:          ["status", "estado", "status negocio", "fase"],
  servicios:       ["servicios", "servicio", "tipo de proyecto", "especialidades"],
  ultimo_contacto: ["ultimo contacto", "fecha", "fecha contacto", "fecha ultimo contacto"],
  notas:           ["notas", "nota", "observaciones", "comentarios"]
};

// Construye un mapa "indice columna en el CSV → campo interno"
function mapHeaders(headers) {
  const idx = {};
  const normalized = headers.map(normCol);
  for (const [field, aliases] of Object.entries(COL_ALIASES)) {
    for (const alias of aliases) {
      const i = normalized.indexOf(alias);
      if (i !== -1) { idx[field] = i; break; }
    }
  }
  return idx;
}

// Convierte un valor de monto del CSV a UF, aplicando heurística para CLP legacy
function parseMontoToUF(raw) {
  if (raw === null || raw === undefined) return 0;
  let s = String(raw).trim();
  if (!s) return 0;
  // Quitar símbolos comunes
  s = s.replace(/CLP|UF|\$|\s/gi, "");
  // Si tiene formato chileno con punto miles y coma decimal: "1.234.567,89"
  // detectar si tiene coma como decimal
  if (s.includes(",") && s.lastIndexOf(",") > s.lastIndexOf(".")) {
    s = s.replace(/\./g, "").replace(",", ".");
  } else {
    // formato anglo: 1,234,567.89 — quitar comas miles
    s = s.replace(/,/g, "");
  }
  const n = parseFloat(s);
  if (isNaN(n) || n <= 0) return 0;
  // Heurística: > 100.000 = CLP legacy, dividir por UF de referencia
  if (n > 100000) return Math.round((n / DEFAULT_UF_CLP) * 100) / 100;
  return n;
}

// Normalizar status a uno de los valores válidos
function normalizeStatus(raw) {
  const s = normCol(raw);
  if (!s) return "Sin definir";
  if (s.includes("adjudic")) return "Proyecto adjudicado";
  if (s.includes("rechaz") || s.includes("perdid")) return "Proyecto rechazado";
  if (s.includes("cotiza")) return "Cotización enviada";
  if (s.includes("negocia")) return "Negociación proyecto";
  if (s.includes("stand") || s.includes("pausa") || s.includes("espera")) return "Stand by";
  if (s.includes("menor") || s.includes("servicio")) return "Servicios menores";
  // Si coincide exactamente con un valor del catálogo, devolverlo
  for (const k of STATUS_LIST) if (normCol(k) === s) return k;
  return "Sin definir";
}

// Limpia valor que puede traer URLs (caso del export Notion: "Cliente (https://...)")
const stripUrl = (s) => String(s || "").replace(/\s*\(https?:\/\/[^)]+\)/g, "").trim();

// Parsea filas CSV a registros internos
function csvToRows(csvText) {
  const matrix = parseCSV(csvText);
  if (matrix.length < 2) {
    return { rows: [], errors: ["El CSV no tiene filas de datos. Necesita al menos una fila de cabecera y una de datos."] };
  }
  const headers = matrix[0];
  const idx = mapHeaders(headers);
  if (idx.proyecto === undefined || idx.cliente === undefined) {
    return {
      rows: [],
      errors: [
        "No se reconocen las columnas obligatorias 'Proyecto' y 'Cliente'.",
        `Cabeceras detectadas: ${headers.join(" | ")}`,
        "Asegúrate de que el CSV tenga columnas con esos nombres (acepta también: Nombre Proyecto, Mandante, Obra, etc.)."
      ]
    };
  }
  const rows = [];
  const warnings = [];
  for (let r = 1; r < matrix.length; r++) {
    const row = matrix[r];
    const proyecto = (row[idx.proyecto] || "").trim();
    if (!proyecto) continue;
    rows.push({
      proyecto,
      cliente:         stripUrl(row[idx.cliente] || ""),
      contacto:        (row[idx.contacto] !== undefined ? row[idx.contacto] : "").trim(),
      email:           (row[idx.email] !== undefined ? row[idx.email] : "").trim(),
      telefono:        (row[idx.telefono] !== undefined ? row[idx.telefono] : "").trim(),
      monto:           parseMontoToUF(row[idx.monto] !== undefined ? row[idx.monto] : 0),
      status:          normalizeStatus(row[idx.status] !== undefined ? row[idx.status] : ""),
      servicios:       (row[idx.servicios] !== undefined ? row[idx.servicios] : "").trim(),
      ultimo_contacto: (row[idx.ultimo_contacto] !== undefined ? row[idx.ultimo_contacto] : "").trim()
    });
  }
  return { rows, errors: [], warnings };
}

// Convierte URLs de servicios cloud a URLs de descarga directa
function normalizeImportUrl(raw) {
  let url = (raw || "").trim();
  if (!url) return null;
  // Google Drive sharing → download directo
  // https://drive.google.com/file/d/FILE_ID/view?usp=sharing
  let m = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if (m) return `https://drive.google.com/uc?export=download&id=${m[1]}`;
  // Google Drive open
  m = url.match(/drive\.google\.com\/open\?id=([^&]+)/);
  if (m) return `https://drive.google.com/uc?export=download&id=${m[1]}`;
  // Dropbox: cambiar dl=0 por dl=1
  if (url.includes("dropbox.com")) {
    return url.replace(/[?&]dl=0/, "?dl=1").replace(/[?&]dl=$/, "?dl=1");
  }
  // Google Sheets export csv
  m = url.match(/docs\.google\.com\/spreadsheets\/d\/([^/]+)/);
  if (m) return `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv`;
  return url;
}

          {mode === "signin" && (
            <div>
              <label className="text-[10px] uppercase tracking-wider text-slate-600 font-semibold block mb-1">Contraseña</label>
              <input type="password" required value={password} onChange={e => setPassword(e.target.value)}
                placeholder="••••••••"
                className="w-full bg-white border border-slate-300 rounded px-3 py-2 text-sm text-slate-900 focus:outline-none focus:border-[#CC1414]" />
            </div>
          )}

          {error && (
            <div className={`text-xs p-3 rounded border ${error.startsWith("✓") ? "bg-emerald-50 border-emerald-200 text-emerald-800" : "bg-rose-50 border-rose-200 text-rose-800"}`}>
              {error}
            </div>
          )}

          <button type="submit" disabled={loading}
            className="w-full px-4 py-2.5 bg-[#CC1414] hover:bg-[#a01010] disabled:bg-slate-300 text-white rounded font-semibold flex items-center justify-center gap-2">
            {loading ? <Icon name="refresh" /> : null}
            {mode === "signin" ? "Ingresar" : "Enviar correo de recuperación"}
          </button>

          <div className="text-center pt-2 border-t border-slate-100">
            <button type="button" onClick={() => { setMode(mode === "signin" ? "reset" : "signin"); setError(null); }}
              className="text-xs text-slate-600 hover:text-[#CC1414]">
              {mode === "signin" ? "¿Olvidaste tu contraseña?" : "← Volver a ingresar"}
            </button>
          </div>
        </form>

        <p className="text-xs text-slate-400 text-center mt-6">
          Si necesitas una cuenta nueva, contáctate con Diego (admin).
        </p>
      </div>
    </div>
  );
}

function SyncBadge({ status }) {
  const cfg = {
    idle:    { label: "",          color: "" },
    syncing: { label: "Sincronizando...", color: "text-amber-600" },
    synced:  { label: "✓ Sincronizado",   color: "text-emerald-600" },
    error:   { label: "⚠ Error sincronizando", color: "text-rose-600" }
  }[status] || { label: "", color: "" };
  if (!cfg.label) return null;
  return <span className={`ml-2 ${cfg.color} normal-case tracking-normal`}>· {cfg.label}</span>;
}

// ============================================================================
// COMPONENTE PRINCIPAL
// ============================================================================
function App() {
  // Estado de autenticación
  const [session, setSession]     = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  // Modo offline: si Supabase no está configurado, fallback a SEED + localStorage (compat v5)
  const isOffline = !SUPABASE_CONFIGURED;

  // Estado de datos (inicializa con SEED en offline para no romper)
  const [data, setData] = useState(() => {
    if (!SUPABASE_CONFIGURED) return lsGet("soil_propuestas_v2") || SEED;
    return [];
  });
  const [dataLoading, setDataLoading] = useState(true);
  const [ufClp, setUfClp] = useState(() => lsGet("soil_uf_clp") || DEFAULT_UF_CLP);

  const [tab, setTab]         = useState("dashboard");
  const [search, setSearch]   = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterCliente, setFilterCliente] = useState("all");
  const [sortBy, setSortBy]   = useState("ultimo_contacto");
  const [sortDir, setSortDir] = useState("desc");
  const [editingIdx, setEditingIdx] = useState(null);
  const [editDraft, setEditDraft]   = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [notes, setNotes]     = useState(() => lsGet("soil_propuestas_notes_v1") || {});
  const [expandedRow, setExpandedRow] = useState(null);
  const [syncStatus, setSyncStatus] = useState("idle");

  // -------- Auth init --------
  useEffect(() => {
    if (isOffline) {
      setSession({ user: { email: "modo-local@soil" } });
      setAuthLoading(false);
      setDataLoading(false);
      return;
    }
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setAuthLoading(false);
    });
    const { data: listener } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  // -------- Cargar datos cuando hay sesión (modo Supabase) --------
  useEffect(() => {
    if (isOffline || !session) return;
    let cancelled = false;
    setDataLoading(true);
    (async () => {
      const { data: rows, error } = await supabase
        .from("propuestas").select("*").order("updated_at", { ascending: false });
      if (cancelled) return;
      if (error) {
        console.error("Error cargando propuestas:", error);
        setSyncStatus("error");
      } else {
        const normalized = (rows || []).map(r => ({
          id: r.id,
          proyecto: r.proyecto, cliente: r.cliente,
          contacto: r.contacto || "", email: r.email || "", telefono: r.telefono || "",
          monto: parseFloat(r.monto_uf) || 0,
          status: r.status,
          servicios: r.servicios || "",
          ultimo_contacto: r.ultimo_contacto || "",
          notas_db: r.notas || ""
        }));
        setData(normalized);
        setSyncStatus("synced");
      }
      const { data: cfg } = await supabase.from("config").select("*").eq("clave", "uf_clp").maybeSingle();
      if (cfg && !cancelled) setUfClp(parseInt(cfg.valor) || DEFAULT_UF_CLP);
      setDataLoading(false);
    })();
    return () => { cancelled = true; };
  }, [session]);

  // -------- Realtime: cuando otro usuario edita, actualizamos en vivo --------
  useEffect(() => {
    if (isOffline || !session) return;
    const channel = supabase
      .channel("propuestas-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "propuestas" }, (payload) => {
        if (payload.eventType === "INSERT" && payload.new) {
          const r = payload.new;
          setData(prev => {
            if (prev.find(p => p.id === r.id)) return prev;
            return [{
              id: r.id, proyecto: r.proyecto, cliente: r.cliente,
              contacto: r.contacto || "", email: r.email || "", telefono: r.telefono || "",
              monto: parseFloat(r.monto_uf) || 0, status: r.status,
              servicios: r.servicios || "", ultimo_contacto: r.ultimo_contacto || "",
              notas_db: r.notas || ""
            }, ...prev];
          });
        } else if (payload.eventType === "UPDATE" && payload.new) {
          const r = payload.new;
          setData(prev => prev.map(p => p.id === r.id ? {
            ...p, proyecto: r.proyecto, cliente: r.cliente,
            contacto: r.contacto || "", email: r.email || "", telefono: r.telefono || "",
            monto: parseFloat(r.monto_uf) || 0, status: r.status,
            servicios: r.servicios || "", ultimo_contacto: r.ultimo_contacto || "",
            notas_db: r.notas || ""
          } : p));
        } else if (payload.eventType === "DELETE" && payload.old) {
          setData(prev => prev.filter(p => p.id !== payload.old.id));
        }
      })
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, [session]);

  // -------- Persistencia offline --------
  useEffect(() => { if (isOffline && !dataLoading) lsSet("soil_propuestas_v2", data); }, [data, dataLoading]);
  useEffect(() => { lsSet("soil_uf_clp", ufClp); }, [ufClp]);
  useEffect(() => { if (isOffline) lsSet("soil_propuestas_notes_v1", notes); }, [notes]);

  // CÁLCULOS
  const stats = useMemo(() => {
    const total      = data.length;
    const adj        = data.filter(d => d.status === "Proyecto adjudicado");
    const rech       = data.filter(d => d.status === "Proyecto rechazado");
    const pipeline   = data.filter(d => d.status === "Cotización enviada" || d.status === "Negociación proyecto");
    const standby    = data.filter(d => d.status === "Stand by");
    const decididas  = adj.length + rech.length;
    const tasaAdj    = decididas ? (adj.length / decididas * 100) : 0;
    const montoAdj   = adj.reduce((s,r) => s + (r.monto || 0), 0);
    const montoPipe  = pipeline.reduce((s,r) => s + (r.monto || 0), 0);
    const montoStandby = standby.reduce((s,r) => s + (r.monto || 0), 0);
    const montoRech  = rech.reduce((s,r) => s + (r.monto || 0), 0);
    const adjConMonto = adj.filter(r => r.monto > 0);
    const ticketAdj  = adjConMonto.length ? montoAdj / adjConMonto.length : 0;

    const porStatus = STATUS_LIST.map(s => {
      const arr = data.filter(d => d.status === s);
      return { status: s, n: arr.length, monto: arr.reduce((a,r) => a + (r.monto||0), 0), color: STATUS_CONFIG[s].color };
    }).filter(x => x.n > 0);

    const clienteMap = {};
    data.forEach(r => {
      if (!clienteMap[r.cliente]) clienteMap[r.cliente] = { cliente: r.cliente, n: 0, adj: 0, rech: 0, pipe: 0, monto: 0, montoAdj: 0 };
      const c = clienteMap[r.cliente];
      c.n++;
      c.monto += r.monto || 0;
      if (r.status === "Proyecto adjudicado") { c.adj++; c.montoAdj += r.monto || 0; }
      if (r.status === "Proyecto rechazado")  c.rech++;
      if (r.status === "Cotización enviada" || r.status === "Negociación proyecto") c.pipe++;
    });
    const clientes = Object.values(clienteMap).map(c => ({
      ...c,
      tasa: (c.adj + c.rech) ? (c.adj / (c.adj + c.rech) * 100) : null
    })).sort((a,b) => b.n - a.n);

    const servMap = {};
    data.forEach(r => {
      const lista = (r.servicios || "").split(",").map(s => s.trim()).filter(Boolean);
      lista.forEach(s => {
        if (!servMap[s]) servMap[s] = { servicio: s, total: 0, adj: 0, rech: 0, montoAdj: 0, proyectosAdj: 0 };
        servMap[s].total++;
        if (r.status === "Proyecto adjudicado") {
          servMap[s].adj++;
          // Valorización: como un proyecto puede tener N servicios, repartimos el monto en partes iguales
          // (no es perfecto pero es la mejor estimación con la data que tenemos)
          if ((r.monto || 0) > 0 && lista.length > 0) {
            servMap[s].montoAdj += (r.monto / lista.length);
            servMap[s].proyectosAdj++;
          }
        }
        if (r.status === "Proyecto rechazado")  servMap[s].rech++;
      });
    });
    const servicios = Object.values(servMap).map(s => ({
      ...s,
      tasa: (s.adj + s.rech) ? (s.adj / (s.adj + s.rech) * 100) : null
    })).sort((a,b) => b.total - a.total);

    // Ranking por valorización (para informe ejecutivo)
    const serviciosValorizados = [...servicios].filter(s => s.adj > 0).sort((a,b) => b.montoAdj - a.montoAdj);

    const tendMap = {};
    data.forEach(r => {
      const d = parseDate(r.ultimo_contacto);
      if (!d) return;
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if (!tendMap[k]) tendMap[k] = { mes: k, total: 0, adj: 0, monto: 0 };
      tendMap[k].total++;
      tendMap[k].monto += r.monto || 0;
      if (r.status === "Proyecto adjudicado") tendMap[k].adj++;
    });
    const tendencia = Object.values(tendMap).sort((a,b) => a.mes.localeCompare(b.mes));

    const top3n = clientes.slice(0,3).reduce((s,c) => s + c.n, 0);
    const concentracion = total ? (top3n / total * 100) : 0;

    return { total, adj, rech, pipeline, standby, decididas, tasaAdj, montoAdj, montoPipe, montoStandby, montoRech, ticketAdj, porStatus, clientes, servicios, serviciosValorizados, tendencia, concentracion };
  }, [data]);

  // INSIGHTS
  const insights = useMemo(() => {
    const items = [];
    const recurrentes = stats.clientes.filter(c => c.n >= 3);
    const estrella = recurrentes.filter(c => c.tasa !== null && c.tasa >= 70).sort((a,b) => b.adj - a.adj)[0];
    if (estrella) items.push({
      tipo: "ganador", titulo: `${estrella.cliente} es tu cliente ancla`,
      detalle: `${estrella.adj}/${estrella.adj+estrella.rech} adjudicados (${estrella.tasa.toFixed(0)}%) — ${fmtUF(estrella.montoAdj)} facturados.`,
      accion: "Consolidar cuenta clave: agendar reunión trimestral, ofrecer paquete preferente, mantener contacto activo aunque no haya licitación abierta."
    });
    const riesgo = recurrentes.filter(c => c.tasa !== null && c.tasa <= 40 && (c.adj + c.rech) >= 2).sort((a,b) => a.tasa - b.tasa)[0];
    if (riesgo) items.push({
      tipo: "riesgo", titulo: `${riesgo.cliente}: tasa de éxito baja`,
      detalle: `Solo ${riesgo.adj}/${riesgo.adj+riesgo.rech} adjudicados (${riesgo.tasa.toFixed(0)}%). Has invertido tiempo en ${riesgo.n} estudios.`,
      accion: "Revisar postmortems: ¿precio, plazo o relación? Pedir feedback explícito al contacto. Antes de cotizar el próximo, calificar si vale la pena el esfuerzo."
    });
    const servGanador = stats.servicios.filter(s => s.total >= 3 && s.tasa !== null && s.tasa >= 70).sort((a,b) => b.tasa - a.tasa)[0];
    if (servGanador) items.push({
      tipo: "ganador", titulo: `"${servGanador.servicio}" es tu servicio más competitivo`,
      detalle: `${servGanador.adj}/${servGanador.adj+servGanador.rech} adjudicados (${servGanador.tasa.toFixed(0)}%). Tu propuesta de valor aquí es fuerte.`,
      accion: "Apalancar: priorizar este servicio en marketing (LinkedIn, sitio web), buscar proyectos donde sea el componente principal, generar caso de éxito documentado."
    });
    const servProblema = stats.servicios.filter(s => s.total >= 3 && s.tasa !== null && s.tasa <= 30).sort((a,b) => a.tasa - b.tasa)[0];
    if (servProblema) items.push({
      tipo: "riesgo", titulo: `"${servProblema.servicio}" tiene baja conversión`,
      detalle: `Apenas ${servProblema.adj}/${servProblema.adj+servProblema.rech} adjudicados (${servProblema.tasa.toFixed(0)}%) sobre ${servProblema.total} cotizaciones.`,
      accion: "Diagnosticar: ¿precio fuera de mercado, mucha competencia, o no es tu sweet spot? Considerar subcontratar, asociar o dejar de cotizarlo standalone."
    });
    if (stats.montoPipe > 0) items.push({
      tipo: "oportunidad", titulo: `Pipeline activo: ${fmtUF(stats.montoPipe)} en juego`,
      detalle: `${stats.pipeline.length} propuestas entre cotización enviada y negociación. Aplicando tu tasa histórica de ${stats.tasaAdj.toFixed(0)}%, esperarías cerrar ~${fmtUF(stats.montoPipe * stats.tasaAdj/100)}.`,
      accion: "Ejecutar follow-up sistemático esta semana sobre cada propuesta del pipeline. La probabilidad de cierre cae rápido tras 30 días sin contacto."
    });
    const hoy = new Date();
    const estancadas = data.filter(r => {
      if (r.status !== "Cotización enviada") return false;
      const d = parseDate(r.ultimo_contacto);
      if (!d) return true;
      return (hoy - d) / (1000*60*60*24) > 60;
    });
    if (estancadas.length > 0) items.push({
      tipo: "alerta", titulo: `${estancadas.length} cotización(es) sin movimiento +60 días`,
      detalle: `Suman ${fmtUF(estancadas.reduce((s,r) => s+(r.monto||0), 0))} en proyectos: ${estancadas.slice(0,3).map(e => e.proyecto).join(", ")}${estancadas.length > 3 ? "..." : ""}`,
      accion: "Llamar (no email) esta semana. Si no contestan en 2 intentos, marcar perdido y reciclar pipeline. La data sucia distorsiona los KPIs."
    });
    if (stats.concentracion > 50) {
      items.push({
        tipo: "riesgo", titulo: `Concentración alta de cartera: ${stats.concentracion.toFixed(0)}% en top 3 clientes`,
        detalle: "Si uno se enfría, el impacto es proporcional. Es un riesgo de continuidad operativa.",
        accion: "Diversificar prospección: definir 5-10 cuentas objetivo nuevas para Q próximo y trabajar outbound dedicado."
      });
    } else if (stats.concentracion > 0) {
      items.push({
        tipo: "info", titulo: `Concentración cartera: ${stats.concentracion.toFixed(0)}% en top 3`,
        detalle: "Diversificación razonable. Sigue construyendo base ancha de clientes recurrentes.",
        accion: "Mantener ratio. Ningún cliente debería superar el 35% de los estudios anuales."
      });
    }
    const sinContacto = data.filter(r => !r.email && !r.telefono && r.status !== "Servicios menores");
    if (sinContacto.length > 0) items.push({
      tipo: "alerta", titulo: `${sinContacto.length} contacto(s) sin datos de contacto registrados`,
      detalle: "Imposible hacer follow-up automatizado o reactivar cuentas frías sin email/teléfono.",
      accion: "Higienizar la base: bloquear 30 minutos esta semana para completar campos faltantes vía LinkedIn o búsqueda directa."
    });
    return items;
  }, [data, stats]);

  const filtered = useMemo(() => {
    let r = data.filter(d => {
      if (filterStatus !== "all" && d.status !== filterStatus) return false;
      if (filterCliente !== "all" && d.cliente !== filterCliente) return false;
      if (search) {
        const q = search.toLowerCase();
        return (d.proyecto+d.cliente+d.contacto+d.servicios+d.email).toLowerCase().includes(q);
      }
      return true;
    });
    r.sort((a,b) => {
      let A = a[sortBy], B = b[sortBy];
      if (sortBy === "ultimo_contacto") { A = parseDate(A) || new Date(0); B = parseDate(B) || new Date(0); }
      if (sortBy === "monto") { A = a.monto; B = b.monto; }
      if (typeof A === "string") A = A.toLowerCase();
      if (typeof B === "string") B = B.toLowerCase();
      if (A < B) return sortDir === "asc" ? -1 : 1;
      if (A > B) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
    return r;
  }, [data, search, filterStatus, filterCliente, sortBy, sortDir]);

  const clientesUnicos = useMemo(() => [...new Set(data.map(d => d.cliente))].sort(), [data]);

  const updateRow = async (id, patch) => {
    if (isOffline) {
      setData(prev => prev.map(r => r.id === id ? { ...r, ...patch } : r));
      return;
    }
    setSyncStatus("syncing");
    const dbPatch = { ...patch };
    if ("monto" in dbPatch) { dbPatch.monto_uf = dbPatch.monto; delete dbPatch.monto; }
    if ("notas_db" in dbPatch) { dbPatch.notas = dbPatch.notas_db; delete dbPatch.notas_db; }
    delete dbPatch.id;
    const { error } = await supabase.from("propuestas").update(dbPatch).eq("id", id);
    if (error) { console.error(error); alert("Error al actualizar: " + error.message); setSyncStatus("error"); }
    else setSyncStatus("synced");
  };

  const deleteRow = async (id) => {
    if (!window.confirm("¿Eliminar esta propuesta? Acción no se puede deshacer.")) return;
    if (isOffline) {
      setData(prev => prev.filter(r => r.id !== id));
      return;
    }
    setSyncStatus("syncing");
    const { error } = await supabase.from("propuestas").delete().eq("id", id);
    if (error) { alert("Error al eliminar: " + error.message); setSyncStatus("error"); }
    else setSyncStatus("synced");
  };

  const addRow = async (row) => {
    if (isOffline) {
      setData(prev => [{ ...row, id: `local-${Date.now()}` }, ...prev]);
      setShowNew(false);
      return;
    }
    setSyncStatus("syncing");
    const dbRow = {
      proyecto: row.proyecto, cliente: row.cliente, contacto: row.contacto,
      email: row.email, telefono: row.telefono, monto_uf: row.monto || 0,
      status: row.status, servicios: row.servicios, ultimo_contacto: row.ultimo_contacto,
      notas: row.notas_db || ""
    };
    const { error } = await supabase.from("propuestas").insert([dbRow]);
    if (error) { alert("Error al crear: " + error.message); setSyncStatus("error"); }
    else { setSyncStatus("synced"); setShowNew(false); }
  };

  const startEdit = (id) => {
    const item = data.find(d => d.id === id);
    if (item) { setEditingIdx(id); setEditDraft({ ...item }); }
  };
  const saveEdit = async () => {
    if (editingIdx === null) return;
    await updateRow(editingIdx, editDraft);
    setEditingIdx(null); setEditDraft(null);
  };
  const handleSort = (col) => {
    if (sortBy === col) setSortDir(sortDir === "asc" ? "desc" : "asc");
    else { setSortBy(col); setSortDir("desc"); }
  };

  // Persistir UF en config (compartido para todo el equipo)
  const updateUfClp = async (newVal) => {
    setUfClp(newVal);
    if (!isOffline) {
      await supabase.from("config").update({ valor: String(newVal) }).eq("clave", "uf_clp");
    }
  };

  const exportCSV = () => {
    const headers = ["Proyecto","Cliente","Contacto","Email","Teléfono","Monto UF","Monto CLP","Status","Servicios","Último contacto","Notas"];
    const rows = data.map(d => [
      d.proyecto, d.cliente, d.contacto, d.email, d.telefono,
      d.monto,
      d.monto > 0 ? Math.round(d.monto * ufClp) : 0,
      d.status, d.servicios, d.ultimo_contacto, d.notas_db || notes[d.proyecto] || ""
    ]);
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `seguimiento_propuestas_soil_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  const printReport = () => { setTab("informe"); setTimeout(() => window.print(), 400); };

  // Importar CSV: en modo Supabase escribe a la BD, en offline escribe local
  const applyImport = async (newRows, mode) => {
    if (isOffline) {
      if (mode === "replace") {
        setData(newRows.map(r => ({ ...r, id: `local-${Date.now()}-${Math.random()}` })));
      } else {
        const key = (r) => `${(r.proyecto || "").toLowerCase().trim()}|${(r.cliente || "").toLowerCase().trim()}`;
        const existing = new Map(data.map(r => [key(r), r]));
        newRows.forEach(r => {
          const k = key(r);
          if (existing.has(k)) existing.set(k, { ...existing.get(k), ...r });
          else existing.set(k, { ...r, id: `local-${Date.now()}-${Math.random()}` });
        });
        setData([...existing.values()]);
      }
      setShowImport(false);
      return;
    }

    // Modo Supabase
    setSyncStatus("syncing");
    const toDbRow = (r) => ({
      proyecto: r.proyecto, cliente: r.cliente,
      contacto: r.contacto || "", email: r.email || "", telefono: r.telefono || "",
      monto_uf: r.monto || 0, status: r.status || "Cotización enviada",
      servicios: r.servicios || "", ultimo_contacto: r.ultimo_contacto || "",
      notas: r.notas || ""
    });

    if (mode === "replace") {
      // Borrar todo y volver a insertar
      const confirmReplace = window.confirm(
        `¡Atención! Esto borrará las ${data.length} propuestas actuales en Supabase y las reemplazará con ${newRows.length}. ¿Continuar?`
      );
      if (!confirmReplace) { setSyncStatus("idle"); return; }
      const { error: delErr } = await supabase.from("propuestas").delete().neq("id", "00000000-0000-0000-0000-000000000000");
      if (delErr) { alert("Error al borrar: " + delErr.message); setSyncStatus("error"); return; }
      const { error } = await supabase.from("propuestas").insert(newRows.map(toDbRow));
      if (error) { alert("Error al insertar: " + error.message); setSyncStatus("error"); return; }
    } else {
      // Fusionar: para cada registro buscamos si existe por proyecto+cliente
      let inserted = 0, updated = 0;
      for (const r of newRows) {
        const existing = data.find(d =>
          (d.proyecto || "").toLowerCase().trim() === (r.proyecto || "").toLowerCase().trim() &&
          (d.cliente || "").toLowerCase().trim() === (r.cliente || "").toLowerCase().trim()
        );
        if (existing) {
          const { error } = await supabase.from("propuestas").update(toDbRow(r)).eq("id", existing.id);
          if (error) { alert("Error fusionando: " + error.message); setSyncStatus("error"); return; }
          updated++;
        } else {
          const { error } = await supabase.from("propuestas").insert([toDbRow(r)]);
          if (error) { alert("Error insertando: " + error.message); setSyncStatus("error"); return; }
          inserted++;
        }
      }
      alert(`Importación completada: ${inserted} nuevas, ${updated} actualizadas.`);
    }
    setSyncStatus("synced");
    setShowImport(false);
  };

  // Guard de carga inicial
  if (authLoading) return <LoadingScreen mensaje="Verificando sesión..." />;
  // Si no hay sesión y no estamos en modo offline, mostrar login
  if (!session && !isOffline) return <LoginScreen />;
  if (dataLoading && session) return <LoadingScreen mensaje="Cargando propuestas..." />;

  return (
    <div className="min-h-screen bg-white text-slate-900">
      <header className="no-print border-b border-slate-200 bg-white/90 backdrop-blur sticky top-0 z-40">
        <div className="max-w-[1600px] mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-4">
            <div className="w-12 h-12 rounded bg-gradient-to-br from-[#CC1414] to-[#8B0000] flex items-center justify-center shadow-lg shadow-red-900/30">
              <span className="display-font text-white text-2xl font-black">S</span>
            </div>
            <div>
              <h1 className="display-font text-3xl font-black tracking-tight text-[#0D2B5E]">SEGUIMIENTO PROPUESTAS</h1>
              <p className="text-xs text-slate-500 uppercase tracking-widest">
                Soil Limitada · Pipeline comercial
                {!isOffline && <SyncBadge status={syncStatus} />}
                {isOffline && <span className="ml-2 text-amber-600">· Modo local (Supabase no configurado)</span>}
              </p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <div className="flex items-center gap-1.5 bg-slate-50 border border-slate-300 rounded px-3 py-1.5 text-xs">
              <span className="text-slate-700 uppercase tracking-wider font-semibold">UF</span>
              <span className="text-slate-500">$</span>
              <input type="number" value={ufClp}
                onChange={e => updateUfClp(parseInt(e.target.value) || DEFAULT_UF_CLP)}
                className="w-20 bg-transparent border-none focus:outline-none text-slate-900 font-mono text-right"
                title="Valor UF en CLP — actualízalo según el día (compartido para todo el equipo)" />
              <span className="text-slate-500">CLP</span>
            </div>
            <button onClick={exportCSV} className="px-4 py-2 text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 rounded transition flex items-center gap-2 border border-slate-300">
              <Icon name="download" /> CSV
            </button>
            <button onClick={() => setShowImport(true)} className="px-4 py-2 text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 rounded transition flex items-center gap-2 border border-slate-300" title="Importar propuestas desde un CSV — archivo local o URL">
              <Icon name="upload" /> Importar
            </button>
            <button onClick={printReport} className="px-4 py-2 text-sm bg-[#CC1414] hover:bg-[#a01010] rounded transition flex items-center gap-2 font-semibold">
              <Icon name="printer" /> Informe Gerencia
            </button>
            {!isOffline && session?.user && (
              <div className="flex items-center gap-2 ml-2 pl-3 border-l border-slate-300">
                <div className="text-xs text-right">
                  <div className="text-slate-500 uppercase tracking-wider text-[9px]">Sesión</div>
                  <div className="text-slate-800 font-medium">{session.user.email}</div>
                </div>
                <button onClick={async () => { await supabase.auth.signOut(); }}
                  className="p-2 hover:bg-slate-100 rounded text-slate-500 hover:text-rose-600 border border-slate-300"
                  title="Cerrar sesión">
                  <Icon name="x" className="w-4 h-4" />
                </button>
              </div>
            )}
          </div>
        </div>
        <nav className="max-w-[1600px] mx-auto px-6 flex gap-1 overflow-x-auto">
          {[
            { id: "dashboard",   label: "Dashboard",   icon: "chart" },
            { id: "propuestas",  label: "Propuestas",  icon: "briefcase" },
            { id: "cotizaciones",label: "Cotizaciones",icon: "calculator" },
            { id: "insights",    label: "Insights",    icon: "zap" },
            { id: "informe",     label: "Informe",     icon: "file" }
          ].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`px-5 py-3 text-sm uppercase tracking-wider font-semibold flex items-center gap-2 transition border-b-2 whitespace-nowrap
                ${tab === t.id ? "border-[#CC1414] text-[#0D2B5E]" : "border-transparent text-slate-500 hover:text-slate-800"}`}>
              <Icon name={t.icon} /> {t.label}
            </button>
          ))}
        </nav>
      </header>

      <main className="max-w-[1600px] mx-auto px-6 py-8">
        {tab === "dashboard" && <Dashboard stats={stats} insights={insights} ufClp={ufClp} />}
        {tab === "propuestas" && <Propuestas
          ufClp={ufClp}
          data={filtered} totalData={data} clientesUnicos={clientesUnicos}
          search={search} setSearch={setSearch}
          filterStatus={filterStatus} setFilterStatus={setFilterStatus}
          filterCliente={filterCliente} setFilterCliente={setFilterCliente}
          sortBy={sortBy} sortDir={sortDir} handleSort={handleSort}
          editingIdx={editingIdx} editDraft={editDraft} setEditDraft={setEditDraft}
          startEdit={startEdit} saveEdit={saveEdit} cancelEdit={() => { setEditingIdx(null); setEditDraft(null); }}
          updateRow={updateRow} deleteRow={deleteRow}
          showNew={showNew} setShowNew={setShowNew} addRow={addRow}
          notes={notes} setNotes={setNotes}
          expandedRow={expandedRow} setExpandedRow={setExpandedRow}
        />}
        {tab === "cotizaciones" && <Cotizaciones ufClp={ufClp} clientesUnicos={clientesUnicos} />}
        {tab === "insights" && <Insights insights={insights} stats={stats} ufClp={ufClp} />}
        {tab === "informe" && <InformeEjecutivo stats={stats} insights={insights} data={data} ufClp={ufClp} />}
      </main>

      {showImport && <ImportarCSVModal onClose={() => setShowImport(false)} onApply={applyImport} currentCount={data.length} />}

      <footer className="no-print border-t border-slate-200 mt-12 py-6 text-center text-xs text-slate-500">
        Soil Limitada · Sociedad Constructora e Inversiones — Dashboard interno · Montos en UF · Datos persistidos en localStorage del navegador
      </footer>
    </div>
  );
}

                        <td colSpan={7} className="p-5">

                            <div>
                              <h4 className="text-xs uppercase tracking-wider text-slate-600 mb-2">Servicios cotizados</h4>
                              <div className="flex flex-wrap gap-1.5">

                              </div>
                              <div className="mt-3 text-xs text-slate-700">
                                <span className="text-slate-500">Teléfono:</span> {row.telefono || "—"}

                            </div>
                            <div>
                              <h4 className="text-xs uppercase tracking-wider text-slate-600 mb-2">Notas internas</h4>
                              <textarea value={row.notas_db || ""}
                                onChange={e => p.updateRow(rowId, { notas_db: e.target.value })}
                                placeholder="Anotaciones de seguimiento, próximos pasos, observaciones..."
                                className="w-full h-24 bg-white border border-slate-300 rounded p-2 text-xs text-slate-900 focus:outline-none focus:border-[#CC1414] resize-none" />
                            </div>

                        </td>
                      </tr>
                    )}

                );
              })}
              {p.data.length === 0 && (
                <tr><td colSpan={7} className="p-12 text-center text-slate-400">Sin resultados con esos filtros.</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

      <div className="grid md:grid-cols-2 gap-3">
        <Field label="Proyecto" value={draft.proyecto} onChange={v => setDraft({...draft, proyecto: v})} />
        <Field label="Cliente"  value={draft.cliente}  onChange={v => setDraft({...draft, cliente: v})} />
        <Field label="Contacto" value={draft.contacto} onChange={v => setDraft({...draft, contacto: v})} />
        <Field label="Email"    value={draft.email}    onChange={v => setDraft({...draft, email: v})} />
        <Field label="Teléfono" value={draft.telefono} onChange={v => setDraft({...draft, telefono: v})} />
        <Field label="Monto en UF" value={draft.monto}   onChange={v => setDraft({...draft, monto: parseFloat(v)||0})} type="number" />
        <ServiciosMultiSelect value={draft.servicios} onChange={v => setDraft({...draft, servicios: v})} />
        <Field label="Último contacto (DD/MM/YYYY)" value={draft.ultimo_contacto} onChange={v => setDraft({...draft, ultimo_contacto: v})} />

            className="w-full bg-white border border-slate-300 rounded px-3 py-2 text-sm text-slate-900 focus:outline-none focus:border-[#CC1414]">
            {STATUS_LIST.map(s => <option key={s} value={s}>{s}</option>)}

      </div>
      <div className="flex justify-end gap-2 pt-2">
        <button onClick={onCancel} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 rounded text-sm flex items-center gap-2">
          <Icon name="x" /> Cancelar
        </button>
        <button onClick={onSave} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded text-sm font-semibold flex items-center gap-2">
          <Icon name="save" /> Guardar
        </button>
      </div>
    </div>
  );
}

function Field({ label, value, onChange, type="text", full=false }) {
  return (
    <div className={full ? "md:col-span-2" : ""}>
      <label className="text-[10px] uppercase tracking-wider text-slate-600 block mb-1">{label}</label>
      <input type={type} value={value || ""} onChange={e => onChange(e.target.value)}
        className="w-full bg-white border border-slate-300 rounded px-3 py-2 text-sm text-slate-900 focus:outline-none focus:border-[#CC1414]" />
    </div>
  );
}

// MultiSelect de servicios — chips clickeables + buscador opcional para servicios nuevos
function ServiciosMultiSelect({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const [customNew, setCustomNew] = useState("");
  const ref = useRef(null);

  // Parse "A, B, C" → ["A","B","C"]
  const selected = useMemo(() => (value || "").split(",").map(s => s.trim()).filter(Boolean), [value]);

  // Catálogo + cualquier servicio custom previamente guardado en el draft
  const opciones = useMemo(() => {
    const set = new Set([...SERVICIOS_CATALOGO, ...selected]);
    return [...set].sort();
  }, [selected]);

  // Cerrar al click fuera
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  const toggle = (s) => {
    const has = selected.includes(s);
    const next = has ? selected.filter(x => x !== s) : [...selected, s];
    onChange(next.join(", "));
  };
  const removeChip = (s) => onChange(selected.filter(x => x !== s).join(", "));
  const addCustom = () => {
    const v = customNew.trim();
    if (!v) return;
    if (!selected.includes(v)) onChange([...selected, v].join(", "));
    setCustomNew("");
  };

  return (
    <div className="md:col-span-2 relative" ref={ref}>
      <label className="text-[10px] uppercase tracking-wider text-slate-600 block mb-1">
        Servicios involucrados <span className="text-slate-500">({selected.length} seleccionado{selected.length !== 1 ? "s" : ""})</span>
      </label>

      {/* Caja con chips */}
      <div onClick={() => setOpen(true)}
        className="min-h-[42px] w-full bg-white border border-slate-300 rounded px-2 py-1.5 text-sm cursor-pointer hover:border-slate-400 focus-within:border-[#CC1414] flex flex-wrap gap-1.5 items-center">
        {selected.length === 0 && <span className="text-slate-400 px-1">Seleccionar servicios...</span>}
        {selected.map((s, i) => (
          <span key={i} className="inline-flex items-center gap-1 px-2 py-0.5 bg-[#CC1414]/10 border border-[#CC1414]/40 text-[#8B0000] rounded text-xs">
            {s}
            <button type="button" onClick={(e) => { e.stopPropagation(); removeChip(s); }}
              className="hover:text-[#CC1414]">
              <Icon name="x" className="w-3 h-3" />
            </button>
          </span>
        ))}
        <span className="ml-auto text-slate-400"><Icon name="chevron" className="w-4 h-4" /></span>
      </div>

      {/* Dropdown */}
      {open && (
        <div className="absolute z-30 mt-1 w-full bg-white border border-slate-300 rounded shadow-2xl max-h-72 overflow-y-auto scrollbar-thin">
          <div className="sticky top-0 bg-white border-b border-slate-200 p-2 flex gap-1">
            <input
              type="text" value={customNew}
              onChange={e => setCustomNew(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); addCustom(); } }}
              placeholder="Agregar servicio nuevo..."
              className="flex-1 bg-white border border-slate-300 rounded px-2 py-1 text-xs text-slate-900 focus:outline-none focus:border-[#CC1414]"
            />
            <button type="button" onClick={addCustom}
              className="px-2 py-1 bg-[#CC1414] hover:bg-[#a01010] rounded text-xs font-semibold flex items-center gap-1">
              <Icon name="plus" className="w-3 h-3" /> Sumar
            </button>
          </div>
          <div className="p-1">
            {opciones.map((s, i) => {
              const checked = selected.includes(s);
              return (
                <button key={i} type="button" onClick={() => toggle(s)}
                  className={`w-full text-left px-3 py-2 rounded text-sm flex items-center gap-2 transition
                    ${checked ? "bg-[#CC1414]/10 text-[#8B0000]" : "hover:bg-slate-100 text-slate-700"}`}>
                  <span className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0
                    ${checked ? "bg-[#CC1414] border-[#CC1414]" : "border-slate-400"}`}>
                    {checked && <Icon name="checkcircle" className="w-3 h-3" />}
                  </span>
                  {s}
                </button>
              );
            })}
          </div>
          <div className="sticky bottom-0 bg-white border-t border-slate-200 p-2 flex justify-end">
            <button type="button" onClick={() => setOpen(false)}
              className="px-3 py-1 bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 rounded text-xs">Cerrar</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================================
// IMPORTAR CSV MODAL
// ============================================================================
function ImportarCSVModal({ onClose, onApply, currentCount }) {
  const [tab, setTab]         = useState("link"); // "file" | "link"
  const [url, setUrl]         = useState("");
  const [parsedRows, setRows] = useState(null);
  const [errors, setErrors]   = useState([]);
  const [warnings, setWarnings] = useState([]);
  const [loading, setLoading] = useState(false);
  const [mode, setMode]       = useState("merge"); // "replace" | "merge"
  const [savedLinks, setSavedLinks] = useState(() => lsGet("soil_import_links") || []);

  const fileInputRef = useRef(null);

  const handleParsed = (csvText) => {
    const result = csvToRows(csvText);
    setRows(result.rows);
    setErrors(result.errors || []);
    setWarnings(result.warnings || []);
  };

  const onFileSelected = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      setErrors(["El archivo es muy grande (máx 5 MB). Asegúrate de que sea solo datos."]);
      return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => handleParsed(ev.target.result);
    reader.onerror = () => setErrors(["No se pudo leer el archivo."]);
    reader.readAsText(file, "UTF-8");
  };

  const onUrlLoad = async () => {
    const direct = normalizeImportUrl(url);
    if (!direct) { setErrors(["Pega primero un link válido."]); return; }
    setLoading(true);
    setErrors([]);
    setRows(null);
    try {
      const resp = await fetch(direct);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const text = await resp.text();
      // Detectar HTML en lugar de CSV (página de login, error, etc.)
      if (text.trim().toLowerCase().startsWith("<!doctype") || text.trim().toLowerCase().startsWith("<html")) {
        throw new Error("La URL devolvió una página HTML en lugar de un CSV. Si es Google Drive/Dropbox, revisa que el link sea de descarga directa o que el archivo sea público.");
      }
      handleParsed(text);
      // Guardar link en historial (máx 5)
      const updated = [url, ...savedLinks.filter(l => l !== url)].slice(0, 5);
      setSavedLinks(updated);
      lsSet("soil_import_links", updated);
    } catch (err) {
      const msg = err.message || String(err);
      // CORS típicamente da "Failed to fetch"
      if (msg.includes("Failed to fetch") || msg.includes("NetworkError")) {
        setErrors([
          "El navegador bloqueó la descarga (CORS).",
          "Esto es normal cuando el HTML está abierto desde el escritorio: muchos servicios cloud no permiten descarga directa.",
          "Solución más rápida: descarga el CSV manualmente y usa la pestaña 'Subir archivo'.",
          "También funciona si subes este HTML a tu sitio (soilconstructora.cl) — desde un dominio web sí puede descargar."
        ]);
      } else {
        setErrors([`No se pudo cargar: ${msg}`]);
      }
    } finally {
      setLoading(false);
    }
  };

  const confirm = () => {
    if (parsedRows && parsedRows.length > 0) {
      onApply(parsedRows, mode);
    }
  };

  const TabBtn = ({ id, icon, label }) => (
    <button onClick={() => { setTab(id); setRows(null); setErrors([]); }}
      className={`flex-1 px-4 py-2.5 text-sm font-semibold border-b-2 flex items-center justify-center gap-2 transition
        ${tab === id ? "border-[#CC1414] text-[#0D2B5E] bg-rose-50/30" : "border-transparent text-slate-500 hover:text-slate-800"}`}>
      <Icon name={icon} className="w-4 h-4" /> {label}
    </button>
  );

  return (
    <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
      <div className="bg-white border border-slate-200 rounded max-w-3xl w-full p-0 max-h-[92vh] overflow-y-auto shadow-2xl">
        <div className="flex items-center justify-between p-6 pb-3">
          <div>
            <h3 className="display-font text-2xl font-bold uppercase text-[#0D2B5E] flex items-center gap-2">
              <Icon name="upload" className="w-5 h-5" /> Importar propuestas desde CSV
            </h3>
            <p className="text-xs text-slate-500 mt-1">
              Carga un archivo local o un link de Google Drive / Dropbox / sitio web. La base actual tiene {currentCount} propuestas.
            </p>
          </div>
          <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded text-slate-700">
            <Icon name="x" className="w-5 h-5" />
          </button>
        </div>

        <div className="flex border-b border-slate-200 mx-6">
          <TabBtn id="link" icon="link"     label="Desde URL / Link" />
          <TabBtn id="file" icon="fileText" label="Subir archivo local" />
        </div>

        <div className="p-6 pt-5 space-y-4">
          {tab === "file" && (
            <div className="space-y-3">
              <div className="border-2 border-dashed border-slate-300 rounded p-8 text-center bg-slate-50/50">
                <Icon name="fileText" className="w-12 h-12 text-slate-400" />
                <div className="mt-3">
                  <button onClick={() => fileInputRef.current?.click()}
                    className="px-4 py-2 bg-[#CC1414] hover:bg-[#a01010] text-white rounded text-sm font-semibold">
                    Seleccionar archivo CSV
                  </button>
                  <input ref={fileInputRef} type="file" accept=".csv,text/csv" onChange={onFileSelected} className="hidden" />
                </div>
                <p className="text-xs text-slate-500 mt-3">
                  Formatos aceptados: CSV con cabeceras. Reconoce nombres en español o inglés.
                  <br />Tamaño máximo: 5 MB.
                </p>
              </div>
            </div>
          )}

          {tab === "link" && (
            <div className="space-y-3">
              <div>
                <label className="text-xs uppercase tracking-wider text-slate-600 font-semibold block mb-1">
                  Link al CSV
                </label>
                <div className="flex gap-2">
                  <input type="url" value={url} onChange={e => setUrl(e.target.value)}
                    placeholder="https://drive.google.com/file/d/.../view o cualquier URL pública..."
                    onKeyDown={e => { if (e.key === "Enter") onUrlLoad(); }}
                    className="flex-1 bg-white border border-slate-300 rounded px-3 py-2 text-sm text-slate-900 focus:outline-none focus:border-[#CC1414]" />
                  <button onClick={onUrlLoad} disabled={loading || !url.trim()}
                    className="px-4 py-2 bg-[#CC1414] hover:bg-[#a01010] disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded text-sm font-semibold flex items-center gap-2">
                    {loading ? <><Icon name="refresh" className="w-4 h-4" /> Cargando...</> : <><Icon name="download" className="w-4 h-4" /> Cargar</>}
                  </button>
                </div>
                <p className="text-xs text-slate-500 mt-2">
                  Soporta enlaces de Google Drive, Dropbox, Google Sheets (se convierten automáticamente a descarga directa).
                </p>
              </div>

              {savedLinks.length > 0 && (
                <div>
                  <label className="text-[10px] uppercase tracking-wider text-slate-600 font-semibold block mb-1.5">
                    Links recientes
                  </label>
                  <div className="space-y-1">
                    {savedLinks.map((l, i) => (
                      <div key={i} className="flex items-center gap-2 group">
                        <button onClick={() => setUrl(l)}
                          className="flex-1 text-left px-3 py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded text-xs text-slate-700 truncate">
                          <Icon name="link" className="w-3 h-3" /> {l}
                        </button>
                        <button onClick={() => {
                          const updated = savedLinks.filter(x => x !== l);
                          setSavedLinks(updated);
                          lsSet("soil_import_links", updated);
                        }} className="p-1 text-slate-400 hover:text-rose-600 opacity-0 group-hover:opacity-100">
                          <Icon name="x" className="w-3 h-3" />
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Errores */}
          {errors.length > 0 && (
            <div className="bg-rose-50 border border-rose-200 rounded p-3">
              <div className="flex items-start gap-2">
                <Icon name="alert" className="w-4 h-4 text-rose-600 mt-0.5" />
                <div className="text-sm text-rose-900 flex-1">
                  {errors.map((e, i) => <p key={i} className={i > 0 ? "mt-1.5 text-xs" : "font-semibold"}>{e}</p>)}
                </div>
              </div>
            </div>
          )}

          {/* Preview */}
          {parsedRows && parsedRows.length > 0 && (
            <div className="bg-emerald-50 border border-emerald-200 rounded p-4">
              <div className="flex items-center gap-2 mb-3">
                <Icon name="checkcircle" className="w-5 h-5 text-emerald-600" />
                <div>
                  <div className="font-semibold text-emerald-900">
                    CSV cargado correctamente · {parsedRows.length} propuesta{parsedRows.length !== 1 ? "s" : ""} detectada{parsedRows.length !== 1 ? "s" : ""}
                  </div>
                  <div className="text-xs text-emerald-700">
                    Ejemplo: {parsedRows[0].proyecto} — {parsedRows[0].cliente}
                  </div>
                </div>
              </div>

              <div className="bg-white border border-emerald-200 rounded p-3 mb-3 max-h-40 overflow-y-auto scrollbar-thin">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="text-slate-500">
                      <th className="text-left p-1">Proyecto</th>
                      <th className="text-left p-1">Cliente</th>
                      <th className="text-right p-1">Monto UF</th>
                      <th className="text-left p-1">Estado</th>
                    </tr>
                  </thead>
                  <tbody>
                    {parsedRows.slice(0, 8).map((r, i) => (
                      <tr key={i} className="border-t border-slate-100">
                        <td className="p-1 truncate max-w-[180px]" title={r.proyecto}>{r.proyecto}</td>
                        <td className="p-1 truncate max-w-[160px]" title={r.cliente}>{r.cliente}</td>
                        <td className="p-1 text-right font-mono">{r.monto > 0 ? r.monto.toLocaleString("es-CL", {maximumFractionDigits: 1}) : "—"}</td>
                        <td className="p-1 text-slate-600">{r.status}</td>
                      </tr>
                    ))}
                    {parsedRows.length > 8 && (
                      <tr><td colSpan={4} className="p-1 text-center text-slate-400 italic">... y {parsedRows.length - 8} más</td></tr>
                    )}
                  </tbody>
                </table>
              </div>

              <div className="space-y-2">
                <label className="text-xs uppercase tracking-wider text-slate-700 font-semibold block">¿Cómo aplicar la importación?</label>
                <label className="flex items-start gap-2 cursor-pointer p-2 rounded hover:bg-emerald-100/50">
                  <input type="radio" name="mode" value="merge" checked={mode === "merge"} onChange={() => setMode("merge")} className="mt-0.5" />
                  <div className="text-sm">
                    <div className="font-semibold text-slate-900">Fusionar con la base actual <span className="text-emerald-700 text-xs">(recomendado)</span></div>
                    <div className="text-xs text-slate-600">Si una propuesta ya existe (mismo proyecto+cliente), se actualiza con los nuevos datos. Las que no estén se agregan.</div>
                  </div>
                </label>
                <label className="flex items-start gap-2 cursor-pointer p-2 rounded hover:bg-rose-50">
                  <input type="radio" name="mode" value="replace" checked={mode === "replace"} onChange={() => setMode("replace")} className="mt-0.5" />
                  <div className="text-sm">
                    <div className="font-semibold text-slate-900">Reemplazar todo</div>
                    <div className="text-xs text-rose-700">Borra las {currentCount} propuestas actuales y deja solo las del CSV. Esta acción no se puede deshacer.</div>
                  </div>
                </label>
              </div>
            </div>
          )}
        </div>

        <div className="border-t border-slate-200 p-4 flex justify-end gap-2 sticky bottom-0 bg-white">
          <button onClick={onClose}
            className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 rounded text-sm">
            Cancelar
          </button>
          <button onClick={confirm} disabled={!parsedRows || parsedRows.length === 0}
            className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded text-sm font-semibold flex items-center gap-2">
            <Icon name="save" className="w-4 h-4" />
            {parsedRows && parsedRows.length > 0
              ? `Importar ${parsedRows.length} propuesta${parsedRows.length !== 1 ? "s" : ""} (${mode === "merge" ? "fusionar" : "reemplazar"})`
              : "Importar"}
          </button>
        </div>
      </div>
    </div>
  );
}

    info:        { color: "border-sky-500/50 bg-sky-50",             icon: "eye",    iconC: "text-sky-600",     tag: "OBSERVACIÓN" }

  );
}

function Insights({ insights, stats, ufClp }) {
  return (
    <div className="space-y-6">
      <div className="bg-gradient-to-r from-rose-50 to-transparent border-l-4 border-[#CC1414] p-5 rounded">

const fmtNum = (n, d=2) => {
  if (n === null || n === undefined || isNaN(n)) return "0";
  return Number(n).toLocaleString("es-CL", { minimumFractionDigits: d, maximumFractionDigits: d });
};

    try {
      let saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) saved = localStorage.getItem("soil_cotizacion_borrador");

        const parsed = JSON.parse(saved);
        if (!parsed.item2_partidas) return COTIZACION_VACIA();

        if (parsed.descripcion_alcance && !Array.isArray(parsed.descripcion_alcance)) {
          const o = parsed.descripcion_alcance;
          parsed.descripcion_alcance = [
            { titulo: "Ítem 1.1",       texto: (o.item1_1   || "").replace(/^Ítem 1\.1:\s*/, "") },

          ].filter(d => d.texto);

        return parsed;

      return COTIZACION_VACIA();
