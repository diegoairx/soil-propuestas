      setCargandoHist(true);
      const { data, error } = await supabase
        .from("cotizaciones")
        .select("id,numero,fecha,estado,cliente_razon_social,proyecto_nombre,total_uf,subtotal_uf,iva_uf,data,updated_at")
        .order("updated_at", { ascending: false })
        .limit(200);
      if (!canceled) {
        if (error) setSyncStatus("offline");
        else setHistorial(data || []);
        setCargandoHist(false);
      }
    };
    cargar();
    const channel = supabase
      .channel("cot-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "cotizaciones" }, () => { cargar(); })
      .subscribe();
    return () => { canceled = true; try { supabase.removeChannel(channel); } catch(e) {} };
  }, [supabaseOn]);

  // Auto-guardar borrador
  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cot));
  }, [cot]);

  const flash = (msg, type="ok") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  };

  // ===== Edición de partidas (Ítem 2: Ejecución de los Trabajos) =====
  const addPartida = (capitulo, item) => {
    const id = Date.now() + Math.random();
    setCot(c => ({
      ...c,
      item2_partidas: [...(c.item2_partidas || []), {
        id, capitulo,
        descripcion: item?.descripcion || "",
        unidad:      item?.unidad      || "GL",
        cantidad:    1,
        precio_uf:   item?.precio_uf   || 0
      }]
    }));
  };
  const updatePartida = (id, patch) => {
    setCot(c => ({ ...c, item2_partidas: (c.item2_partidas||[]).map(p => p.id === id ? { ...p, ...patch } : p) }));
  };
  const removePartida = (id) => {
    setCot(c => ({ ...c, item2_partidas: (c.item2_partidas||[]).filter(p => p.id !== id) }));
  };
  const duplicarPartida = (id) => {
    const orig = (cot.item2_partidas||[]).find(p => p.id === id);
    if (!orig) return;
    const nueva = { ...orig, id: Date.now() + Math.random() };
    setCot(c => ({ ...c, item2_partidas: [...(c.item2_partidas||[]), nueva] }));
  };
  const moverPartida = (id, dir) => {
    setCot(c => {
      const arr = c.item2_partidas || [];
      const idx = arr.findIndex(p => p.id === id);
      if (idx < 0) return c;
      const nuevo = [...arr];
      const swap = idx + dir;
      if (swap < 0 || swap >= nuevo.length) return c;
      [nuevo[idx], nuevo[swap]] = [nuevo[swap], nuevo[idx]];
      return { ...c, item2_partidas: nuevo };
    });
  };

  // Editor item1 (logística) y item3 (stand-by)
  const updateItem1 = (id, patch) => setCot(c => ({ ...c, item1_partidas: (c.item1_partidas||[]).map(p => p.id===id?{...p,...patch}:p) }));
  const updateItem3 = (id, patch) => setCot(c => ({ ...c, item3_partidas: (c.item3_partidas||[]).map(p => p.id===id?{...p,...patch}:p) }));
  const removeItem3 = (id) => setCot(c => ({ ...c, item3_partidas: (c.item3_partidas||[]).filter(p => p.id !== id) }));
  const addItem3 = () => setCot(c => {
    const arr = c.item3_partidas || [];
    const nuevoNumero = "3." + (arr.length + 1);
    return { ...c, item3_partidas: [...arr, { id: Date.now() + Math.random(), item: nuevoNumero, descripcion: "", unidad: "Hora", cantidad_txt: "Eventual", precio_uf: 0 }] };
  });

  // ===== Totales =====
  const totales = useMemo(() => {
    const it1 = (cot.item1_partidas||[]).reduce((s,p) => s + (Number(p.cantidad)||0)*(Number(p.precio_uf)||0), 0);
    const it2 = (cot.item2_partidas||[]).reduce((s,p) => s + (Number(p.cantidad)||0)*(Number(p.precio_uf)||0), 0);
    const subtotal_uf = it1 + it2;  // item3 son eventuales, no entran en total
    const iva_uf      = subtotal_uf * 0.19;
    const total_uf    = subtotal_uf + iva_uf;
    return { it1, it2, subtotal_uf, iva_uf, total_uf };
  }, [cot.item1_partidas, cot.item2_partidas]);

  // Agrupar partidas de item2 por capítulo (catálogo)
  const partidasPorCapitulo = useMemo(() => {
    const map = {};
    (cot.item2_partidas||[]).forEach((p, idx) => {
      const cap = p.capitulo || "Sin clasificar";
      if (!map[cap]) map[cap] = [];
      map[cap].push({ ...p, _idx: idx });
    });
    return map;
  }, [cot.item2_partidas]);

  // ===== Acciones =====
  const nuevaCotizacion = () => {
    if ((cot.item2_partidas||[]).length > 0 && !confirm("¿Descartar la cotización actual y comenzar una nueva?")) return;
    setCot(COTIZACION_VACIA());
    setCotId(null);
    flash("Cotización en blanco creada");
  };

  const guardarEnHistorial = async () => {
    if (!cot.cliente.razon_social || cot.cliente.razon_social.startsWith("[")) {
      flash("Falta razón social del cliente", "err"); return;
    }
    if (!supabaseOn) {
      // Fallback localStorage
      const item = { ...cot, total_uf: totales.total_uf, guardada_en: new Date().toISOString() };
      const nuevo = [item, ...historial.filter(h => h.numero !== cot.numero)].slice(0, 50);
      setHistorial(nuevo);
      try { localStorage.setItem("soil_cotizacion_historial", JSON.stringify(nuevo)); } catch(e) {}
      flash("Guardado local (Supabase no configurado)"); return;
    }
    setSyncStatus("saving");
    const payload = {
      numero:              cot.numero,
      fecha:               cot.fecha,
      ciudad:              cot.ciudad,
      validez:             cot.validez,
      moneda:              cot.moneda,
      cliente_razon_social: cot.cliente.razon_social,
      cliente_rut:         cot.cliente.rut || null,
      cliente_contacto:    cot.cliente.contacto || null,
      cliente_email:       cot.cliente.email || null,
      proyecto_nombre:     cot.proyecto.nombre || null,
      proyecto_ubicacion:  cot.proyecto.ubicacion || null,
      total_uf:    Number(totales.total_uf)    || 0,
      subtotal_uf: Number(totales.subtotal_uf) || 0,
      iva_uf:      Number(totales.iva_uf)      || 0,
      data:        cot
    };
    let res;
    if (cotId) {
      res = await supabase.from("cotizaciones").update(payload).eq("id", cotId).select().single();
    } else {
      // Si ya existe una con el mismo número, hacemos upsert por numero
      res = await supabase.from("cotizaciones").upsert(payload, { onConflict: "numero" }).select().single();
    }
    if (res.error) {
      setSyncStatus("error");
      flash("Error guardando: " + res.error.message, "err");
      return;
    }
    if (res.data && res.data.id) setCotId(res.data.id);
    setSyncStatus("saved");
    flash("Cotización guardada en Supabase");
    setTimeout(() => setSyncStatus("idle"), 2500);
  };

  const cargarDelHistorial = (item) => {
    // item viene de Supabase con item.data conteniendo el modelo completo, o es estructura local
    if (item && item.data && item.data.cliente) {
      setCot(item.data);
      setCotId(item.id || null);
    } else {
      setCot(item);
      setCotId(null);
    }
    setShowHistorial(false);
    flash("Cotización cargada");
  };

  const eliminarDelHistorial = async (item) => {
    if (!confirm("¿Eliminar definitivamente esta cotización? Acción quedará en audit_log.")) return;
    if (supabaseOn && item.id) {
      const { error } = await supabase.from("cotizaciones").delete().eq("id", item.id);
      if (error) { flash("Error eliminando: " + error.message, "err"); return; }
      if (cotId === item.id) setCotId(null);
      flash("Eliminada");
    } else {
      const nuevo = historial.filter(h => h.numero !== item.numero);
      setHistorial(nuevo);
      try { localStorage.setItem("soil_cotizacion_historial", JSON.stringify(nuevo)); } catch(e) {}
    }
  };

  // ===== Exportación: PDF =====
  const exportarPDF = async () => {
    if (!printRef.current) return;
    if (!window.html2pdf) { flash("Librería PDF no cargó. Refresca la página.", "err"); return; }
    flash("Generando PDF...");
    const opt = {
      margin:       [12, 12, 14, 12],
      filename:     `${cot.numero}_${(cot.cliente.razon_social || "Cliente").replace(/\s+/g,"_")}.pdf`,
      image:        { type: "jpeg", quality: 0.95 },
      html2canvas:  { scale: 2, useCORS: true, logging: false },
      jsPDF:        { unit: "mm", format: "a4", orientation: "portrait" },
      pagebreak:    { mode: ["avoid-all", "css", "legacy"] }
    };
    try {
      await window.html2pdf().set(opt).from(printRef.current).save();
      flash("PDF descargado");
    } catch (e) {
      flash("Error generando PDF: " + e.message, "err");
    }
  };

  // ===== Exportación: Word (HTML compatible) =====
  const exportarWord = () => {
    if (!printRef.current) { flash("Vista previa no disponible", "err"); return; }
    flash("Generando Word...");
    const contenidoHtml = printRef.current.innerHTML;
    const html = `
<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>${cot.numero}</title>
<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->
<style>
@page WordSection1 { size: 21cm 29.7cm; margin: 2cm 2cm 2cm 2cm; }
div.WordSection1 { page: WordSection1; }
body { font-family: "Calibri","Inter",sans-serif; color: #1f2937; font-size: 11pt; line-height: 1.4; }
h1,h2,h3 { font-family: "Calibri","Barlow Condensed",sans-serif; color: #0D2B5E; }
table { border-collapse: collapse; width: 100%; margin: 8px 0; }
th, td { border: 1px solid #94a3b8; padding: 6px 8px; vertical-align: top; font-size: 10pt; }
th { background: #0D2B5E; color: #fff; font-weight: 700; }
.cap-row td { background: #fef2f2; color: #0D2B5E; font-weight: 700; }
.totals-row td { background: #f1f5f9; font-weight: 700; }
.brand-band { background: #0D2B5E; color: #fff; padding: 14px 16px; }
.brand-band h1 { color: #fff; margin: 0 0 4px 0; font-size: 20pt; }
.red-line { border-top: 3px solid #CC1414; margin: 6px 0 12px; }
.muted { color: #64748b; font-size: 9pt; }
.box { border: 1px solid #cbd5e1; padding: 10px 12px; margin: 6px 0; }
</style>
</head>
<body><div class="WordSection1">${contenidoHtml}</div></body>
</html>`;
    const blob = new Blob(['﻿', html], { type: "application/msword" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${cot.numero}_${(cot.cliente.razon_social || "Cliente").replace(/\s+/g,"_")}.doc`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    flash("Word descargado");
  };

  const totalClp = totales.total_uf * (ufClp || 38000);
  const subtotalClp = totales.subtotal_uf * (ufClp || 38000);
  const ivaClp = totales.iva_uf * (ufClp || 38000);

  // ============= RENDER =============
  return (
    <div className="space-y-6">
      {/* Toast */}
      {toast && (
        <div className={`fixed top-20 right-6 z-50 px-4 py-3 rounded shadow-lg border-l-4 text-sm font-medium
          ${toast.type === "err" ? "bg-rose-50 border-rose-600 text-rose-900" : "bg-emerald-50 border-emerald-600 text-emerald-900"}`}>
          {toast.msg}
        </div>
      )}

      {/* Header con acciones */}
      <div className="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h2 className="display-font text-3xl font-black text-[#0D2B5E] tracking-tight">COTIZACIONES</h2>
          <p className="text-sm text-slate-500">Crea, edita y exporta propuestas comerciales — formato Soil Limitada</p>
        </div>
        <div className="flex flex-wrap gap-2">
          <button onClick={nuevaCotizacion}
            className="px-4 py-2 text-xs uppercase tracking-wider font-semibold bg-white border border-slate-300 rounded hover:bg-slate-50 flex items-center gap-2">
            <Icon name="plus" /> Nueva
          </button>
          <button onClick={() => setShowHistorial(true)}
            className="px-4 py-2 text-xs uppercase tracking-wider font-semibold bg-white border border-slate-300 rounded hover:bg-slate-50 flex items-center gap-2">
            <Icon name="layers" /> Historial ({historial.length})
          </button>
          <button onClick={guardarEnHistorial}
            disabled={syncStatus === "saving"}
            className="px-4 py-2 text-xs uppercase tracking-wider font-semibold bg-white border border-[#0D2B5E] text-[#0D2B5E] rounded hover:bg-blue-50 flex items-center gap-2 disabled:opacity-60">
            <Icon name={syncStatus === "saving" ? "refresh" : "save"} className={syncStatus === "saving" ? "w-4 h-4 animate-spin" : "w-4 h-4"} />
            {syncStatus === "saving" ? "Guardando..." : syncStatus === "saved" ? "Guardado ✓" : "Guardar"}
            {!supabaseOn && <span className="text-[9px] text-rose-600">(local)</span>}
          </button>
          <button onClick={exportarWord}
            className="px-4 py-2 text-xs uppercase tracking-wider font-semibold bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-2">
            <Icon name="fileWord" /> Word
          </button>
          <button onClick={exportarPDF}
            className="px-4 py-2 text-xs uppercase tracking-wider font-semibold bg-[#CC1414] text-white rounded hover:bg-rose-700 flex items-center gap-2">
            <Icon name="filePdf" /> PDF
          </button>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        {/* === Columna izquierda: Editor === */}
        <div className="lg:col-span-2 space-y-4">

          {/* 1) Encabezado */}
          <Seccion icon="fileText" title="Encabezado de la Cotización" defaultOpen={true}>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              <CotField label="N° Cotización" value={cot.numero}  onChange={v => setCot(c => ({ ...c, numero: v }))} />
              <CotField label="Fecha"         value={cot.fecha}   onChange={v => setCot(c => ({ ...c, fecha: v, fecha_larga: v ? new Date(v + "T00:00").getDate() + " de " + meses_es[new Date(v + "T00:00").getMonth()] + " de " + new Date(v + "T00:00").getFullYear() : c.fecha_larga }))} type="date" />
              <CotField label="Ciudad"        value={cot.ciudad}  onChange={v => setCot(c => ({ ...c, ciudad: v }))} />
              <CotField label="Validez"       value={cot.validez} onChange={v => setCot(c => ({ ...c, validez: v }))} />
            </div>
          </Seccion>

          {/* 2) Cliente */}
          <Seccion icon="users" title="Datos del Cliente / Destinatario" defaultOpen={true}>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <CotField label="Razón Social"  value={cot.cliente.razon_social} onChange={v => setCot(c => ({ ...c, cliente: { ...c.cliente, razon_social: v } }))} />
              <CotField label="RUT"           value={cot.cliente.rut}          onChange={v => setCot(c => ({ ...c, cliente: { ...c.cliente, rut: v } }))} placeholder="76.xxx.xxx-x" />
              <CotField label="Contacto"      value={cot.cliente.contacto}     onChange={v => setCot(c => ({ ...c, cliente: { ...c.cliente, contacto: v } }))} />
              <CotField label="Cargo"         value={cot.cliente.cargo}        onChange={v => setCot(c => ({ ...c, cliente: { ...c.cliente, cargo: v } }))} />
              <CotField label="Email"         value={cot.cliente.email}        onChange={v => setCot(c => ({ ...c, cliente: { ...c.cliente, email: v } }))} />
              <CotField label="Teléfono"      value={cot.cliente.telefono}     onChange={v => setCot(c => ({ ...c, cliente: { ...c.cliente, telefono: v } }))} />
            </div>
          </Seccion>

          {/* 3) Proyecto */}
          <Seccion icon="briefcase" title="Datos del Proyecto" defaultOpen={true}>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
              <CotField label="Nombre del Proyecto" value={cot.proyecto.nombre}    onChange={v => setCot(c => ({ ...c, proyecto: { ...c.proyecto, nombre: v } }))} />
              <CotField label="Ubicación"           value={cot.proyecto.ubicacion} onChange={v => setCot(c => ({ ...c, proyecto: { ...c.proyecto, ubicacion: v } }))} />
            </div>
            <CotTextarea label="Referencia (breve descripción del alcance)" rows={2} value={cot.proyecto.referencia} onChange={v => setCot(c => ({ ...c, proyecto: { ...c.proyecto, referencia: v } }))} />
            <CotTextarea label="Modalidad" rows={2} value={cot.proyecto.modalidad} onChange={v => setCot(c => ({ ...c, proyecto: { ...c.proyecto, modalidad: v } }))} />
          </Seccion>

          {/* 4) Saludo + Antecedentes */}
          <Seccion icon="fileText" title="Saludo y Antecedentes">
            <CotField    label="Saludo" value={cot.saludo} onChange={v => setCot(c => ({ ...c, saludo: v }))} />
            <div className="h-3" />
            <CotTextarea label="Introducción" rows={3} value={cot.intro} onChange={v => setCot(c => ({ ...c, intro: v }))} />
            <div className="h-3" />
            <ListaEditable label="Antecedentes (documentos parte de la cotización)" items={cot.antecedentes} onChange={arr => setCot(c => ({ ...c, antecedentes: arr }))} placeholder="Ej. Mecánica de Suelos – archivo.pdf" />
          </Seccion>

          {/* 5) A. Resumen y consideraciones */}
          <Seccion icon="layers" title="A. Resumen y Consideraciones del Trabajo">
            <CotTextarea label="Alcance general" rows={3} value={cot.alcance_general} onChange={v => setCot(c => ({ ...c, alcance_general: v }))} />
            <div className="h-3" />
            <ListaEditable label="Características técnicas y limitaciones" items={cot.caracteristicas} onChange={arr => setCot(c => ({ ...c, caracteristicas: arr }))} placeholder="Ej. Profundidad máxima 12,0 m" />
            <div className="h-3" />
            <CubicacionEditor cubicacion={cot.cubicacion} onChange={arr => setCot(c => ({ ...c, cubicacion: arr }))} />
          </Seccion>

          {/* 6) B. Propuesta económica — Item 1, 2, 3 */}
          <Seccion icon="calculator" title="B. Propuesta Económica" defaultOpen={true}>

            {/* Item 1: Logística */}
            <div className="mb-4">
              <div className="text-xs uppercase tracking-wider font-bold text-[#0D2B5E] mb-2">Ítem 1: Logística, Movilización y Puesta en Marcha</div>
              {(cot.item1_partidas || []).map(p => (
                <div key={p.id} className="space-y-2 border border-slate-200 rounded p-3 bg-slate-50">
                  <CotTextarea label={"Descripción " + p.item} rows={3} value={p.descripcion} onChange={v => updateItem1(p.id, { descripcion: v })} />
                  <div className="grid grid-cols-3 gap-2">
                    <CotField label="Unidad"     value={p.unidad}    onChange={v => updateItem1(p.id, { unidad: v })} />
                    <CotField label="Cantidad"   value={p.cantidad}  onChange={v => updateItem1(p.id, { cantidad: Number(v) })} type="number" />
                    <CotField label="P. Unit UF" value={p.precio_uf} onChange={v => updateItem1(p.id, { precio_uf: Number(v) })} type="number" />
                  </div>
                  <div className="text-right text-xs">Total: <strong className="text-[#0D2B5E]">{fmtNum((Number(p.cantidad)||0)*(Number(p.precio_uf)||0), 2)} UF</strong></div>
                </div>
              ))}
            </div>

            {/* Item 2: Ejecución */}
            <div className="mb-4">
              <div className="flex items-center justify-between mb-2">
                <div className="text-xs uppercase tracking-wider font-bold text-[#0D2B5E]">Ítem 2: Ejecución de los Trabajos ({(cot.item2_partidas||[]).length})</div>
                <button onClick={() => setShowCatalogo(true)}
                  className="px-2.5 py-1 text-[10px] uppercase tracking-wider font-semibold bg-[#0D2B5E] text-white rounded hover:bg-blue-900 flex items-center gap-1">
                  <Icon name="plus" className="w-3 h-3" /> Agregar partida
                </button>
              </div>
              {(cot.item2_partidas||[]).length === 0 ? (
                <div className="text-center py-6 text-slate-400 text-xs border border-dashed border-slate-300 rounded">
                  Sin partidas en Ejecución — agrega desde catálogo
                </div>
              ) : (
                <div className="space-y-3">
                  {Object.entries(partidasPorCapitulo).map(([capitulo, items]) => (
                    <div key={capitulo} className="border border-slate-200 rounded overflow-hidden">
                      <div className="bg-rose-50 px-3 py-1.5 border-b border-slate-200">
                        <span className="text-[10px] uppercase tracking-wider font-bold text-[#0D2B5E]">{capitulo}</span>
                      </div>
                      <table className="w-full text-xs">
                        <thead className="bg-slate-100 text-slate-600">
                          <tr>
                            <th className="px-2 py-1 text-left font-semibold">Descripción</th>
                            <th className="px-2 py-1 text-center font-semibold w-14">Un.</th>
                            <th className="px-2 py-1 text-right font-semibold w-20">Cant.</th>
                            <th className="px-2 py-1 text-right font-semibold w-24">P.U. UF</th>
                            <th className="px-2 py-1 text-right font-semibold w-24">Total UF</th>
                            <th className="px-2 py-1 w-24"></th>
                          </tr>
                        </thead>
                        <tbody>
                          {items.map(p => {
                            const totalLinea = (Number(p.cantidad)||0) * (Number(p.precio_uf)||0);
                            return (
                              <tr key={p.id} className="border-t border-slate-200 hover:bg-slate-50">
                                <td className="px-2 py-1"><input value={p.descripcion} onChange={e => updatePartida(p.id, { descripcion: e.target.value })} className="w-full bg-transparent text-xs focus:outline-none focus:bg-white focus:border focus:border-[#0D2B5E] rounded px-1" /></td>
                                <td className="px-2 py-1"><input value={p.unidad} onChange={e => updatePartida(p.id, { unidad: e.target.value })} className="w-full bg-transparent text-xs text-center focus:outline-none focus:bg-white focus:border focus:border-[#0D2B5E] rounded px-1" /></td>
                                <td className="px-2 py-1"><input type="number" step="0.01" value={p.cantidad} onChange={e => updatePartida(p.id, { cantidad: Number(e.target.value) })} className="w-full bg-transparent text-xs text-right focus:outline-none focus:bg-white focus:border focus:border-[#0D2B5E] rounded px-1" /></td>
                                <td className="px-2 py-1"><input type="number" step="0.001" value={p.precio_uf} onChange={e => updatePartida(p.id, { precio_uf: Number(e.target.value) })} className="w-full bg-transparent text-xs text-right focus:outline-none focus:bg-white focus:border focus:border-[#0D2B5E] rounded px-1" /></td>
                                <td className="px-2 py-1 text-right font-semibold text-[#0D2B5E]">{fmtNum(totalLinea, 2)}</td>
                                <td className="px-2 py-1">
                                  <div className="flex items-center justify-end gap-0.5">
                                    <button onClick={() => moverPartida(p.id, -1)} className="p-0.5 text-slate-400 hover:text-[#0D2B5E]">▲</button>
                                    <button onClick={() => moverPartida(p.id, 1)}  className="p-0.5 text-slate-400 hover:text-[#0D2B5E]">▼</button>
                                    <button onClick={() => duplicarPartida(p.id)}  className="p-0.5 text-slate-400 hover:text-emerald-600"><Icon name="copy"  className="w-3 h-3" /></button>
                                    <button onClick={() => removePartida(p.id)}    className="p-0.5 text-slate-400 hover:text-rose-600"><Icon name="trash" className="w-3 h-3" /></button>
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Item 3: Stand-by */}
            <div>
              <div className="flex items-center justify-between mb-2">
                <div className="text-xs uppercase tracking-wider font-bold text-[#0D2B5E]">Ítem 3: Costos Eventuales (Stand-by)</div>
                <button onClick={addItem3}
                  className="px-2.5 py-1 text-[10px] uppercase tracking-wider font-semibold bg-[#0D2B5E] text-white rounded hover:bg-blue-900 flex items-center gap-1">
                  <Icon name="plus" className="w-3 h-3" /> Nueva partida
                </button>
              </div>
              {(cot.item3_partidas || []).length === 0 && (
                <div className="text-center py-4 text-slate-400 text-xs border border-dashed border-slate-300 rounded">
                  Sin partidas eventuales. Usa "Nueva partida" para agregar.
                </div>
              )}
              {(cot.item3_partidas || []).map(p => (
                <div key={p.id} className="grid grid-cols-12 gap-2 mb-2 items-end">
                  <div className="col-span-12 md:col-span-5">
                    <label className="block text-[10px] uppercase tracking-wider font-semibold text-slate-500 mb-1">{p.item}</label>
                    <input value={p.descripcion} onChange={e => updateItem3(p.id, { descripcion: e.target.value })} className="w-full text-xs border border-slate-300 rounded px-2 py-1.5 focus:outline-none focus:border-[#0D2B5E]" />
                  </div>
                  <div className="col-span-3 md:col-span-2">
                    <label className="block text-[10px] uppercase tracking-wider font-semibold text-slate-500 mb-1">Unidad</label>
                    <input value={p.unidad} onChange={e => updateItem3(p.id, { unidad: e.target.value })} className="w-full text-xs border border-slate-300 rounded px-2 py-1.5 focus:outline-none focus:border-[#0D2B5E]" />
                  </div>
                  <div className="col-span-3 md:col-span-2">
                    <label className="block text-[10px] uppercase tracking-wider font-semibold text-slate-500 mb-1">Cantidad</label>
                    <input value={p.cantidad_txt} onChange={e => updateItem3(p.id, { cantidad_txt: e.target.value })} className="w-full text-xs border border-slate-300 rounded px-2 py-1.5 focus:outline-none focus:border-[#0D2B5E]" />
                  </div>
                  <div className="col-span-4 md:col-span-2">
                    <label className="block text-[10px] uppercase tracking-wider font-semibold text-slate-500 mb-1">P.U. UF</label>
                    <input type="number" step="0.01" value={p.precio_uf} onChange={e => updateItem3(p.id, { precio_uf: Number(e.target.value) })} className="w-full text-xs border border-slate-300 rounded px-2 py-1.5 focus:outline-none focus:border-[#0D2B5E]" />
                  </div>
                  <div className="col-span-2 md:col-span-1 flex justify-end">
                    <button onClick={() => { if (confirm("¿Eliminar esta partida del Ítem 3?")) removeItem3(p.id); }}
                      className="p-2 text-slate-400 hover:text-rose-600 border border-transparent hover:border-rose-200 rounded"

                      <Icon name="trash" className="w-4 h-4" />
                    </button>
                  </div>
                </div>
              ))}
            </div>

            <div className="mt-4 pt-4 border-t border-slate-200">
              <div className="flex items-center justify-between mb-2">
                <div className="text-xs uppercase tracking-wider font-bold text-[#0D2B5E]">Descripción del alcance de los ítems</div>
                <button onClick={() => setCot(c => ({ ...c, descripcion_alcance: [...(Array.isArray(c.descripcion_alcance)?c.descripcion_alcance:[]), { titulo: "Ítem nuevo", texto: "" }] }))}
                  className="px-2.5 py-1 text-[10px] uppercase tracking-wider font-semibold bg-[#0D2B5E] text-white rounded hover:bg-blue-900 flex items-center gap-1">
                  <Icon name="plus" className="w-3 h-3" /> Nueva descripción
                </button>
              </div>
              <div className="space-y-2">
                {(Array.isArray(cot.descripcion_alcance) ? cot.descripcion_alcance : []).map((d, i) => (
                  <div key={i} className="border border-slate-200 rounded p-3 bg-slate-50">
                    <div className="flex items-center gap-2 mb-2">
                      <input value={d.titulo}
                        onChange={e => setCot(c => ({ ...c, descripcion_alcance: c.descripcion_alcance.map((x, idx) => idx === i ? { ...x, titulo: e.target.value } : x) }))}
                        placeholder="Título (ej. Ítem 1.1)"
                        className="flex-1 text-xs font-semibold text-[#0D2B5E] bg-white border border-slate-300 rounded px-2 py-1 focus:outline-none focus:border-[#0D2B5E]" />
                      <button onClick={() => { if (confirm("¿Eliminar esta descripción?")) setCot(c => ({ ...c, descripcion_alcance: c.descripcion_alcance.filter((_, idx) => idx !== i) })); }}
                        className="p-1.5 text-slate-400 hover:text-rose-600 border border-transparent hover:border-rose-200 rounded"
                        title="Eliminar descripción">
                        <Icon name="trash" className="w-4 h-4" />
                      </button>
                    </div>
                    <textarea value={d.texto} rows={3}
                      onChange={e => setCot(c => ({ ...c, descripcion_alcance: c.descripcion_alcance.map((x, idx) => idx === i ? { ...x, texto: e.target.value } : x) }))}

                      className="w-full text-sm border border-slate-300 rounded px-3 py-2 focus:outline-none focus:border-[#0D2B5E]" />

          {/* 8) D. Stand-by */}
          <Seccion icon="pause" title="D. Horas de Paralización (Stand-by)">
            <CotTextarea label="Introducción" rows={3} value={cot.standby_intro} onChange={v => setCot(c => ({ ...c, standby_intro: v }))} />
            <div className="h-3" />
            <ListaEditable label="Causas que originan stand-by" items={cot.standby_causas} onChange={arr => setCot(c => ({ ...c, standby_causas: arr }))} />
            <div className="h-3" />
            <CotTextarea label="Cláusula de cierre" rows={4} value={cot.standby_cierre} onChange={v => setCot(c => ({ ...c, standby_cierre: v }))} />
          </Seccion>

          {/* 9) E. Alcances y condiciones */}
          <Seccion icon="checkcircle" title="E. Alcances y Condiciones Generales">
            <ListaEditable label="Aportes de Soil Ltda."    items={cot.aportes_soil}    onChange={arr => setCot(c => ({ ...c, aportes_soil: arr }))} />
            <div className="h-3" />
            <ListaEditable label="Aportes del Cliente"      items={cot.aportes_cliente} onChange={arr => setCot(c => ({ ...c, aportes_cliente: arr }))} />
            <div className="h-3" />
            <ListaEditable label="Generales"                items={cot.generales}       onChange={arr => setCot(c => ({ ...c, generales: arr }))} />

          <Seccion icon="spreadsheet" title="F. Matriz de Responsabilidad">
            <CotTextarea label="Texto introductorio" rows={2} value={cot.matriz_intro} onChange={v => setCot(c => ({ ...c, matriz_intro: v }))} />
            <div className="h-3" />
            <MatrizEditor matriz={cot.matriz} onChange={arr => setCot(c => ({ ...c, matriz: arr }))} />
          </Seccion>

          {/* 11) G. Aspectos comerciales */}
          <Seccion icon="dollar" title="G. Aspectos Comerciales">
            {Object.entries(cot.comercial).map(([k, v]) => (
              <div key={k} className="mb-2">
                <CotTextarea label={k.replace(/_/g, " ").replace(/\b\w/g, ch => ch.toUpperCase())} rows={3} value={v} onChange={nv => setCot(c => ({ ...c, comercial: { ...c.comercial, [k]: nv } }))} />
              </div>
            ))}
          </Seccion>

          {/* 12) Firmas */}
          <Seccion icon="users" title="Firmas y Cierre">
            <CotTextarea label="Texto de cierre" rows={3} value={cot.cierre_texto} onChange={v => setCot(c => ({ ...c, cierre_texto: v }))} />
            <div className="h-3" />
            <div className="border border-slate-200 rounded p-3 bg-slate-50 max-w-md">
              <div className="text-[10px] uppercase tracking-wider font-bold text-slate-500 mb-2">Firma</div>
              <CotField    label="Nombre"  value={cot.firma_izq.nombre}  onChange={v => setCot(c => ({ ...c, firma_izq: { ...c.firma_izq, nombre: v } }))} />
              <div className="h-2" />
              <CotField    label="Cargo"   value={cot.firma_izq.cargo}   onChange={v => setCot(c => ({ ...c, firma_izq: { ...c.firma_izq, cargo: v } }))} />
              <div className="h-2" />
              <CotField    label="Empresa" value={cot.firma_izq.empresa} onChange={v => setCot(c => ({ ...c, firma_izq: { ...c.firma_izq, empresa: v } }))} />
            </div>
          </Seccion>

        </div>

        {/* === Columna derecha: Resumen y Vista Previa === */}
        <div className="space-y-4">
          {/* Totales */}
          <div className="bg-gradient-to-br from-[#0D2B5E] to-[#1e3a8a] text-white rounded shadow-lg">
            <div className="px-4 py-3 border-b border-blue-800 text-xs uppercase tracking-wider font-bold">
              Totales
            </div>
            <div className="p-5 space-y-3">
              <div className="flex justify-between items-baseline">
                <span className="text-xs uppercase tracking-wider text-blue-200">Subtotal</span>
                <div className="text-right">
                  <div className="font-bold text-lg">{fmtNum(totales.subtotal_uf, 2)} UF</div>
                  <div className="text-[10px] text-blue-300">${fmtNum(subtotalClp, 0)}</div>
                </div>
              </div>
              <div className="flex justify-between items-baseline">
                <span className="text-xs uppercase tracking-wider text-blue-200">IVA 19%</span>
                <div className="text-right">
                  <div className="font-medium">{fmtNum(totales.iva_uf, 2)} UF</div>
                  <div className="text-[10px] text-blue-300">${fmtNum(ivaClp, 0)}</div>
                </div>
              </div>
              <div className="border-t border-blue-700 pt-3 flex justify-between items-baseline">
                <span className="text-xs uppercase tracking-wider font-bold text-white">Total</span>
                <div className="text-right">
                  <div className="font-black text-2xl text-white display-font">{fmtNum(totales.total_uf, 2)} <span className="text-sm">UF</span></div>
                  <div className="text-[10px] text-blue-300">${fmtNum(totalClp, 0)} CLP</div>
                </div>
              </div>
              <div className="pt-2 text-[10px] text-blue-300">
                UF referencia: ${fmtNum(ufClp || 38000, 2)} · Datos del dashboard
              </div>
            </div>
          </div>

          {/* Resumen ejecutivo */}
          <div className="bg-white border border-slate-200 rounded shadow-sm">
            <div className="px-4 py-3 border-b border-slate-200 bg-slate-50 text-xs uppercase tracking-wider font-bold text-slate-700">
              Resumen por Capítulo
            </div>
            <div className="p-4 space-y-2 text-xs">
              {Object.keys(partidasPorCapitulo).length === 0 ? (
                <div className="text-slate-400 text-center py-2">Sin partidas aún</div>
              ) : Object.entries(partidasPorCapitulo).map(([cap, items]) => {
                const tot = items.reduce((s, i) => s + (Number(i.cantidad)||0) * (Number(i.precio_uf)||0), 0);
                const pct = totales.subtotal_uf > 0 ? (tot / totales.subtotal_uf * 100) : 0;
                return (
                  <div key={cap}>
                    <div className="flex justify-between mb-1">
                      <span className="font-medium text-slate-700">{cap}</span>
                      <span className="font-semibold text-[#0D2B5E]">{fmtNum(tot, 2)} UF</span>
                    </div>
                    <div className="h-1.5 bg-slate-100 rounded overflow-hidden">
                      <div className="h-full bg-[#CC1414]" style={{ width: pct + "%" }}></div>
                    </div>
                    <div className="text-[10px] text-slate-400 text-right mt-0.5">{pct.toFixed(1)}%</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Mini vista previa */}
          <div className="bg-white border border-slate-200 rounded shadow-sm">
            <div className="px-4 py-3 border-b border-slate-200 bg-slate-50 flex items-center justify-between">
              <span className="text-xs uppercase tracking-wider font-bold text-slate-700">Vista previa</span>
              <span className="text-[10px] text-slate-400">Se exporta a PDF/Word</span>
            </div>
            <div className="p-3 max-h-80 overflow-auto bg-slate-50">
              <div className="origin-top-left bg-white shadow" style={{ transform: "scale(0.45)", width: "222%" }}>
                <CotizacionPreview cot={cot} totales={totales} ufClp={ufClp} />
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Vista imprimible oculta (fuera de pantalla) — usada para exportar */}
      <div style={{ position: "absolute", left: "-99999px", top: 0, width: "210mm" }}>
        <div ref={printRef}>
          <CotizacionPreview cot={cot} totales={totales} ufClp={ufClp} />
        </div>
      </div>

      {/* Modal: Catálogo */}
      {showCatalogo && (
        <CatalogoModal
          onClose={() => setShowCatalogo(false)}
          onAdd={(cap, item) => addPartida(cap, item)}
          onAddVacia={(cap) => addPartida(cap, null)}
        />
      )}

      {/* Modal: Historial */}
      {showHistorial && (
        <HistorialModal
          historial={historial}
          cargando={cargandoHist}
          supabaseOn={supabaseOn}
          onClose={() => setShowHistorial(false)}
          onLoad={cargarDelHistorial}
          onDelete={eliminarDelHistorial}
        />
      )}
    </div>
  );
}

// ===== Campos auxiliares =====
function CotField({ label, value, onChange, type="text", placeholder, options }) {
  return (
    <div>
      <label className="block text-[10px] uppercase tracking-wider font-semibold text-slate-500 mb-1">{label}</label>
      {options ? (
        <select value={value} onChange={e => onChange(e.target.value)}
          className="w-full text-sm border border-slate-300 rounded px-2 py-1.5 focus:outline-none focus:border-[#0D2B5E]">
          {options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      ) : (
        <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
          className="w-full text-sm border border-slate-300 rounded px-2 py-1.5 focus:outline-none focus:border-[#0D2B5E]" />
      )}
    </div>
  );
}

function CotTextarea({ label, value, onChange, rows=3, placeholder }) {
  return (
    <div>
      <label className="block text-[10px] uppercase tracking-wider font-semibold text-slate-500 mb-1">{label}</label>
      <textarea value={value} onChange={e => onChange(e.target.value)} rows={rows} placeholder={placeholder}
        className="w-full text-sm border border-slate-300 rounded px-3 py-2 focus:outline-none focus:border-[#0D2B5E]" />
    </div>
  );
}

// ===== Helpers de editor =====
function Seccion({ icon, title, children, defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="bg-white border border-slate-200 rounded shadow-sm">
      <button onClick={() => setOpen(!open)}
        className="w-full px-4 py-3 border-b border-slate-200 bg-slate-50 flex items-center justify-between hover:bg-slate-100 transition">
        <div className="flex items-center gap-2">
          <Icon name={icon} className="w-4 h-4 text-[#0D2B5E]" />
          <span className="text-xs uppercase tracking-wider font-bold text-slate-700">{title}</span>
        </div>
        <Icon name="chevron" className={"w-4 h-4 text-slate-500 transition-transform " + (open ? "" : "-rotate-90")} />
      </button>
      {open && <div className="p-4">{children}</div>}
    </div>
  );
}

function ListaEditable({ label, items, onChange, placeholder = "Nuevo ítem" }) {
  const update = (i, v) => onChange(items.map((it, idx) => idx === i ? v : it));
  const remove = (i) => onChange(items.filter((_, idx) => idx !== i));
  const mover  = (i, dir) => {
    const arr = [...items]; const sw = i + dir;
    if (sw < 0 || sw >= arr.length) return;
    [arr[i], arr[sw]] = [arr[sw], arr[i]]; onChange(arr);
  };
  const agregar = () => onChange([...items, ""]);
  return (
    <div>
      <label className="block text-[10px] uppercase tracking-wider font-semibold text-slate-500 mb-1">{label}</label>
      <div className="space-y-1.5">
        {(items || []).map((it, i) => (
          <div key={i} className="flex gap-1 items-start">
            <span className="text-[10px] text-slate-400 mt-2 w-5 text-right">{i+1}.</span>
            <textarea value={it} onChange={e => update(i, e.target.value)} rows={Math.max(1, Math.ceil((it||"").length/85))}
              className="flex-1 text-xs border border-slate-300 rounded px-2 py-1.5 focus:outline-none focus:border-[#0D2B5E]" />
            <div className="flex flex-col gap-0.5">
              <button onClick={() => mover(i, -1)} className="px-1 text-slate-400 hover:text-[#0D2B5E] text-[10px]">▲</button>
              <button onClick={() => mover(i, 1)}  className="px-1 text-slate-400 hover:text-[#0D2B5E] text-[10px]">▼</button>
            </div>
            <button onClick={() => remove(i)} className="p-1 text-slate-400 hover:text-rose-600">
              <Icon name="trash" className="w-3 h-3" />
            </button>
          </div>
        ))}
        <button onClick={agregar} className="text-[10px] uppercase tracking-wider font-semibold text-[#0D2B5E] hover:underline flex items-center gap-1">
          <Icon name="plus" className="w-3 h-3" /> Agregar
        </button>
      </div>
    </div>
  );
}

function CubicacionEditor({ cubicacion, onChange }) {
  const update = (i, patch) => onChange(cubicacion.map((it, idx) => idx === i ? { ...it, ...patch } : it));
  const remove = (i) => onChange(cubicacion.filter((_, idx) => idx !== i));
  const agregar = () => onChange([...cubicacion, { n: cubicacion.length + 1, descripcion: "", unidad: "GL", cantidad: "" }]);
  return (
    <div>
      <label className="block text-[10px] uppercase tracking-wider font-semibold text-slate-500 mb-1">Cubicación base de los trabajos</label>
      <table className="w-full text-xs border border-slate-200 rounded">
        <thead className="bg-slate-100"><tr>
          <th className="px-2 py-1 w-10 text-left">N°</th>
          <th className="px-2 py-1 text-left">Descripción</th>
          <th className="px-2 py-1 w-16 text-center">Unidad</th>
          <th className="px-2 py-1 w-24 text-right">Cantidad</th>
          <th className="px-2 py-1 w-10"></th>

function MatrizEditor({ matriz, onChange }) {
  const update = (i, patch) => onChange(matriz.map((it, idx) => idx === i ? { ...it, ...patch } : it));
  const remove = (i) => onChange(matriz.filter((_, idx) => idx !== i));
  const toggle = (i, col) => update(i, { [col]: matriz[i][col] === "X" ? "" : "X" });
  const agregar = () => onChange([...matriz, { desc: "", soil: "", cliente: "" }]);
  return (
    <div className="max-h-96 overflow-auto border border-slate-200 rounded">
      <table className="w-full text-xs">
        <thead className="bg-slate-100 sticky top-0"><tr>
          <th className="px-2 py-1.5 text-left">Ítem / Descripción</th>
          <th className="px-2 py-1.5 w-16 text-center">Soil</th>
          <th className="px-2 py-1.5 w-16 text-center">Cliente</th>
          <th className="px-2 py-1.5 w-10"></th>
        </tr></thead>
        <tbody>
          {(matriz || []).map((it, i) => (
            <tr key={i} className="border-t border-slate-200">
              <td className="px-2 py-1"><input value={it.desc} onChange={e => update(i, { desc: e.target.value })} className="w-full bg-transparent text-xs focus:outline-none focus:bg-white focus:border focus:border-[#0D2B5E] rounded px-1" /></td>
              <td className="px-2 py-1 text-center"><button onClick={() => toggle(i, "soil")} className={"w-6 h-6 rounded text-xs font-bold " + (it.soil === "X" ? "bg-[#0D2B5E] text-white" : "bg-slate-100 text-slate-300 hover:bg-slate-200")}>{it.soil === "X" ? "X" : "·"}</button></td>
              <td className="px-2 py-1 text-center"><button onClick={() => toggle(i, "cliente")} className={"w-6 h-6 rounded text-xs font-bold " + (it.cliente === "X" ? "bg-[#CC1414] text-white" : "bg-slate-100 text-slate-300 hover:bg-slate-200")}>{it.cliente === "X" ? "X" : "·"}</button></td>
              <td className="px-2 py-1"><button onClick={() => remove(i)} className="text-slate-400 hover:text-rose-600"><Icon name="trash" className="w-3 h-3" /></button></td>
            </tr>
          ))}
        </tbody>
      </table>
      <button onClick={agregar} className="m-2 text-[10px] uppercase tracking-wider font-semibold text-[#0D2B5E] hover:underline flex items-center gap-1">
        <Icon name="plus" className="w-3 h-3" /> Agregar fila
      </button>
    </div>
  );
}

// ===== Modal: Catálogo de servicios (editable + capítulos personalizados) =====
const CATALOGO_CUSTOM_KEY = "soil_catalogo_custom";

function CatalogoModal({ onClose, onAdd, onAddVacia }) {
  // Catálogo personalizado del usuario, persistido en localStorage
  const [catalogoCustom, setCatalogoCustom] = useState(() => {
    try { return JSON.parse(localStorage.getItem(CATALOGO_CUSTOM_KEY) || "{}"); }
    catch { return {}; }
  });
  const guardarCustom = (nuevo) => {
    setCatalogoCustom(nuevo);
    try { localStorage.setItem(CATALOGO_CUSTOM_KEY, JSON.stringify(nuevo)); } catch(e) {}
  };

  // Catálogo combinado: seed (read-only) + custom (editable)
  const catalogoCompleto = useMemo(() => {
    return { ...CATALOGO_SERVICIOS, ...catalogoCustom };
  }, [catalogoCustom]);

  const [busqueda, setBusqueda] = useState("");
  const [capActivo, setCapActivo] = useState(Object.keys(catalogoCompleto)[0]);
  const [modoEditor, setModoEditor] = useState(null); // null | "newCap" | "newItem"
  const [nuevoCap, setNuevoCap] = useState("");
  const [nuevoItem, setNuevoItem] = useState({ descripcion: "", unidad: "GL", precio_uf: 0 });

  const esCapCustom = !!catalogoCustom[capActivo];
  const itemsCapActivo = catalogoCompleto[capActivo] || [];

  const itemsFiltrados = useMemo(() => {
    if (!busqueda) return itemsCapActivo;
    const q = busqueda.toLowerCase();
    return itemsCapActivo.filter(i =>
      (i.descripcion || "").toLowerCase().includes(q) || (i.unidad || "").toLowerCase().includes(q)
    );
  }, [busqueda, itemsCapActivo]);

  // Crear nuevo capítulo
  const crearCapitulo = () => {
    const nombre = (nuevoCap || "").trim();
    if (!nombre) return;
    if (catalogoCompleto[nombre]) { alert("Ya existe un capítulo con ese nombre"); return; }
    const nuevo = { ...catalogoCustom, [nombre]: [] };
    guardarCustom(nuevo);
    setCapActivo(nombre);
    setNuevoCap("");
    setModoEditor(null);
  };

  // Eliminar capítulo personalizado
  const eliminarCapitulo = () => {
    if (!esCapCustom) { alert("No se puede eliminar un capítulo predefinido"); return; }
    if (!confirm("¿Eliminar el capítulo \"" + capActivo + "\" y todas sus partidas personalizadas?")) return;
    const nuevo = { ...catalogoCustom };
    delete nuevo[capActivo];
    guardarCustom(nuevo);
    setCapActivo(Object.keys({ ...CATALOGO_SERVICIOS, ...nuevo })[0]);
  };

  // Agregar partida al capítulo custom activo
  const agregarItemAlCapitulo = () => {
    if (!esCapCustom) { alert("Solo se pueden agregar partidas a capítulos personalizados"); return; }
    if (!nuevoItem.descripcion.trim()) return;
    const nuevo = {
      ...catalogoCustom,
      [capActivo]: [...(catalogoCustom[capActivo] || []), { ...nuevoItem, precio_uf: Number(nuevoItem.precio_uf) || 0 }]
    };
    guardarCustom(nuevo);
    setNuevoItem({ descripcion: "", unidad: "GL", precio_uf: 0 });
    setModoEditor(null);
  };

  // Eliminar partida custom
  const eliminarItem = (idx) => {
    if (!esCapCustom) return;
    if (!confirm("¿Eliminar esta partida del capítulo?")) return;
    const arr = [...(catalogoCustom[capActivo] || [])];
    arr.splice(idx, 1);
    guardarCustom({ ...catalogoCustom, [capActivo]: arr });
  };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div className="bg-white rounded shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col">
        <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
          <div>
            <div className="display-font text-xl font-black text-[#0D2B5E]">CATÁLOGO DE SERVICIOS</div>
            <div className="text-xs text-slate-500">Precios referenciales editables — ajústalos según el proyecto</div>
          </div>
          <button onClick={onClose} className="p-2 text-slate-400 hover:text-rose-600">
            <Icon name="x" />
          </button>
        </div>

        <div className="px-6 py-3 border-b border-slate-200 flex flex-wrap gap-2 items-center">
          {Object.keys(catalogoCompleto).map(cap => {
            const isCustom = !!catalogoCustom[cap];
            return (
              <button key={cap} onClick={() => { setCapActivo(cap); setModoEditor(null); }}
                className={"px-3 py-1.5 text-xs uppercase tracking-wider font-semibold rounded transition flex items-center gap-1 " +
                  (capActivo === cap ? "bg-[#0D2B5E] text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200")}>
                {cap}
                {isCustom && <span className={"text-[8px] px-1 rounded " + (capActivo === cap ? "bg-blue-900 text-blue-200" : "bg-amber-100 text-amber-700")}>MÍO</span>}
              </button>
            );
          })}
          <button onClick={() => { setModoEditor(modoEditor === "newCap" ? null : "newCap"); }}
            className="px-3 py-1.5 text-xs uppercase tracking-wider font-semibold rounded transition bg-emerald-600 text-white hover:bg-emerald-700 flex items-center gap-1">
            <Icon name="plus" className="w-3 h-3" /> Nuevo capítulo
          </button>
          {esCapCustom && (
            <button onClick={eliminarCapitulo}
              className="px-2 py-1.5 text-xs uppercase tracking-wider font-semibold rounded transition bg-white border border-rose-300 text-rose-600 hover:bg-rose-50 flex items-center gap-1"
              title="Eliminar capítulo personalizado">
              <Icon name="trash" className="w-3 h-3" />
            </button>
          )}
        </div>

        {modoEditor === "newCap" && (
          <div className="px-6 py-3 border-b border-slate-200 bg-emerald-50 flex items-center gap-2">
            <input value={nuevoCap} onChange={e => setNuevoCap(e.target.value)}
              placeholder="Nombre del nuevo capítulo (ej. Hormigones, Demoliciones, Topografía...)"
              className="flex-1 text-sm border border-slate-300 rounded px-3 py-2 focus:outline-none focus:border-[#0D2B5E]" />
            <button onClick={crearCapitulo}
              className="px-3 py-2 text-xs uppercase tracking-wider font-semibold bg-emerald-600 text-white rounded hover:bg-emerald-700">
              Crear
            </button>
            <button onClick={() => { setModoEditor(null); setNuevoCap(""); }}
              className="px-3 py-2 text-xs uppercase tracking-wider font-semibold bg-white border border-slate-300 rounded hover:bg-slate-50">
              Cancelar
            </button>
          </div>
        )}

        <div className="px-6 py-3 border-b border-slate-200">
          <input value={busqueda} onChange={e => setBusqueda(e.target.value)}
            placeholder="Buscar partida en este capítulo..."
            className="w-full text-sm border border-slate-300 rounded px-3 py-2 focus:outline-none focus:border-[#0D2B5E]" />
        </div>

        <div className="flex-1 overflow-auto px-6 py-4">
          <div className="space-y-2">
            {itemsFiltrados.map((item, idx) => (
              <div key={idx} className="flex items-center justify-between gap-3 p-3 border border-slate-200 rounded hover:bg-slate-50 hover:border-[#0D2B5E] transition">
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-slate-800">{item.descripcion}</div>
                  <div className="text-xs text-slate-500 mt-0.5">
                    <span className="font-semibold">{item.unidad}</span> · referencia {fmtNum(item.precio_uf, 3)} UF/un
                  </div>
                </div>
                <div className="flex items-center gap-1">
                  <button onClick={() => { onAdd(capActivo, item); }}
                    className="px-3 py-1.5 text-xs uppercase tracking-wider font-semibold bg-[#CC1414] text-white rounded hover:bg-rose-700 flex items-center gap-1">
                    <Icon name="plus" className="w-3 h-3" /> Agregar
                  </button>
                  {esCapCustom && (
                    <button onClick={() => eliminarItem(idx)}
                      className="p-1.5 text-slate-400 hover:text-rose-600 border border-transparent hover:border-rose-200 rounded"
                      title="Eliminar partida del catálogo personalizado">
                      <Icon name="trash" className="w-3 h-3" />
                    </button>
                  )}
                </div>
              </div>
            ))}
            {itemsFiltrados.length === 0 && (
              <div className="text-center py-8 text-slate-400 text-sm">
                {esCapCustom ? "Capítulo vacío — agrega tu primera partida abajo" : "Sin resultados"}
              </div>
            )}

            {esCapCustom && (
              <div className="mt-3 pt-3 border-t border-dashed border-slate-300">
                {modoEditor === "newItem" ? (
                  <div className="p-3 bg-emerald-50 rounded border border-emerald-200 space-y-2">
                    <div className="text-[10px] uppercase tracking-wider font-bold text-emerald-700">Nueva partida en "{capActivo}"</div>
                    <input value={nuevoItem.descripcion}
                      onChange={e => setNuevoItem({ ...nuevoItem, descripcion: e.target.value })}
                      placeholder="Descripción de la partida"
                      className="w-full text-sm border border-slate-300 rounded px-3 py-2 focus:outline-none focus:border-[#0D2B5E]" />
                    <div className="grid grid-cols-2 gap-2">
                      <input value={nuevoItem.unidad}
                        onChange={e => setNuevoItem({ ...nuevoItem, unidad: e.target.value })}
                        placeholder="Unidad (m³, ml, gl...)"
                        className="text-sm border border-slate-300 rounded px-3 py-2 focus:outline-none focus:border-[#0D2B5E]" />
                      <input type="number" step="0.001" value={nuevoItem.precio_uf}
                        onChange={e => setNuevoItem({ ...nuevoItem, precio_uf: e.target.value })}
                        placeholder="Precio referencial en UF"
                        className="text-sm border border-slate-300 rounded px-3 py-2 focus:outline-none focus:border-[#0D2B5E]" />
                    </div>
                    <div className="flex gap-2">
                      <button onClick={agregarItemAlCapitulo}
                        className="px-3 py-2 text-xs uppercase tracking-wider font-semibold bg-emerald-600 text-white rounded hover:bg-emerald-700">
                        Guardar partida
                      </button>
                      <button onClick={() => { setModoEditor(null); setNuevoItem({ descripcion: "", unidad: "GL", precio_uf: 0 }); }}
                        className="px-3 py-2 text-xs uppercase tracking-wider font-semibold bg-white border border-slate-300 rounded hover:bg-slate-50">
                        Cancelar
                      </button>
                    </div>
                  </div>
                ) : (
                  <button onClick={() => setModoEditor("newItem")}
                    className="w-full px-3 py-2 text-xs uppercase tracking-wider font-semibold bg-emerald-50 text-emerald-700 border border-dashed border-emerald-400 rounded hover:bg-emerald-100 flex items-center justify-center gap-1">
                    <Icon name="plus" className="w-3 h-3" /> Agregar partida a este capítulo
                  </button>
                )}
              </div>
            )}
          </div>
        </div>

        <div className="px-6 py-3 border-t border-slate-200 bg-slate-50 flex items-center justify-between">
          <button onClick={() => { onAddVacia(capActivo); onClose(); }}
            className="text-xs uppercase tracking-wider font-semibold text-[#0D2B5E] hover:underline flex items-center gap-1">
            <Icon name="plus" className="w-3 h-3" /> Agregar partida vacia
          </button>
          <button onClick={onClose} className="px-4 py-2 text-xs uppercase tracking-wider font-semibold bg-white border border-slate-300 rounded hover:bg-slate-100">Listo</button>
        </div>
      </div>
    </div>
  );
}

// ===== Modal: Historial =====
function HistorialModal({ historial, cargando, supabaseOn, onClose, onLoad, onDelete }) {
  const [q, setQ] = useState("");
  const filtrado = useMemo(() => {
    if (!q) return historial;
    const ql = q.toLowerCase();
    return historial.filter(h => {
      const cli  = h.cliente_razon_social || (h.cliente && h.cliente.razon_social) || "";
      const proy = h.proyecto_nombre      || (h.proyecto && h.proyecto.nombre)     || "";
      return (h.numero || "").toLowerCase().includes(ql) ||
             cli.toLowerCase().includes(ql) ||
             proy.toLowerCase().includes(ql);
    });
  }, [historial, q]);

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div className="bg-white rounded shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col">
        <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
          <div>
            <div className="display-font text-xl font-black text-[#0D2B5E]">HISTORIAL DE COTIZACIONES</div>
            <div className="text-xs text-slate-500">
              {supabaseOn
                ? ("Sincronizado con Supabase - " + historial.length + " registros" + (cargando ? " - cargando..." : ""))
                : ("Local en este navegador - " + historial.length + " registros")}
            </div>
          </div>
          <button onClick={onClose} className="p-2 text-slate-400 hover:text-rose-600">
            <Icon name="x" />
          </button>
        </div>
        <div className="px-6 py-3 border-b border-slate-200">
          <input value={q} onChange={e => setQ(e.target.value)}
            placeholder="Buscar por numero, cliente o proyecto..."
            className="w-full text-sm border border-slate-300 rounded px-3 py-2 focus:outline-none focus:border-[#0D2B5E]" />
        </div>
        <div className="flex-1 overflow-auto px-6 py-4">
          {filtrado.length === 0 ? (
            <div className="text-center py-12 text-slate-400 text-sm">
              {historial.length === 0 ? "Sin cotizaciones guardadas aun" : "Sin resultados para tu busqueda"}
            </div>
          ) : (
            <div className="space-y-2">
              {filtrado.map((h, idx) => {
                const cli  = h.cliente_razon_social || (h.cliente && h.cliente.razon_social) || "-";
                const proy = h.proyecto_nombre      || (h.proyecto && h.proyecto.nombre)     || "";
                const totalUf = Number(h.total_uf || 0);
                const npart = (h.data && h.data.item2_partidas && h.data.item2_partidas.length) || (h.item2_partidas && h.item2_partidas.length) || 0;
                const fechaTxt = h.updated_at ? new Date(h.updated_at).toLocaleString("es-CL")
                  : h.guardada_en ? new Date(h.guardada_en).toLocaleString("es-CL")
                  : h.fecha || "";
                return (
                  <div key={h.id || h.numero || idx} className="border border-slate-200 rounded p-3 hover:border-[#0D2B5E] transition">
                    <div className="flex items-center justify-between gap-3">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="text-xs font-mono font-bold text-[#CC1414]">{h.numero}</span>
                          <span className="text-xs text-slate-400">.</span>
                          <span className="text-sm font-semibold text-slate-800 truncate">{cli}</span>
                          {h.estado && (
                            <span className="text-[9px] uppercase tracking-wider px-1.5 py-0.5 rounded bg-slate-100 text-slate-600 font-semibold">{h.estado}</span>
                          )}
                        </div>
                        <div className="text-xs text-slate-500 mt-0.5">
                          {proy} - {npart} partidas - <strong className="text-[#0D2B5E]">{fmtNum(totalUf, 2)} UF</strong>
                        </div>
                        <div className="text-[10px] text-slate-400 mt-0.5">Actualizada: {fechaTxt}</div>
                      </div>
                      <div className="flex items-center gap-2">
                        <button onClick={() => onLoad(h)}
                          className="px-3 py-1.5 text-xs uppercase tracking-wider font-semibold bg-[#0D2B5E] text-white rounded hover:bg-blue-900">
                          Cargar
                        </button>
                        <button onClick={() => onDelete(h)}
                          className="p-2 text-slate-400 hover:text-rose-600">
                          <Icon name="trash" className="w-4 h-4" />
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
